<template>
    <template if:true={isEditMode}>
        <div class="overlay"></div> <!-- Blocking overlay -->
    </template>
    <template if:true={displayEmptyMessage}>
        <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
            No fields are available at this stage.
        </div>
    </template>
    <div class={tabClass}>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>

        <template if:true={sections}>
            <lightning-accordion allow-multiple-sections-open active-section-name={allSectionIds}
                class="custom-accordion">
                <lightning-record-edit-form record-id={recordId} object-api-name={objectApiName} onsubmit={handleSubmit}
                    onsuccess={handleSuccess} onerror={handleError}>

                    <template if:true={isEditMode}>
                        <div class="slds-section-group minimumheight">
                            <template for:each={filteredSections} for:item="section">
                                <div key={section.id} class="slds-section slds-is-open">
                                    <h3 class="slds-section__title slds-theme_shade">
                                        <button aria-controls={section.id} aria-expanded="true"
                                            class="slds-button slds-section__title-action" onclick={handleSectionToggle}
                                            data-section-id={section.id}>
                                            <lightning-icon icon-name="utility:switch" size="x-small"
                                                class="slds-section-title-action-icon slds-buttonicon slds-button__icon_left"></lightning-icon>
                                            <span class="slds-truncate" title={section.label}>{section.label}</span>
                                        </button>
                                    </h3>

                                    <div aria-hidden="false" class="slds-section__content" id={section.id}>
                                        <div class="slds-grid slds-wrap slds-p-around_medium">
                                            <template for:each={section.fields} for:item="field">
                                                <template if:true={field.isVisibleByRule}>
                                                    <template if:true={field.isEditable}>
                                                        <div key={field.apiName} class={field.columnClass} style="padding: 0 2%;">

                                                            <label for={field.apiName} class="slds-form-element__label">
                                                                <template if:true={field.isRequired}>
                                                                    <abbr class="slds-required" aria-hidden="true"
                                                                        title="required">*</abbr>
                                                                </template>
                                                                {field.label} <template if:true={field.helptext}><lightning-helptext style="vertical-align: bottom;" content={field.helptext}></lightning-helptext></template>
                                                            </label>
                                                            <!-- <lightning-input-field field-name={field.apiName}
                                                                class="edit-input" variant="label-hidden">
                                                            </lightning-input-field> -->
                                                            <lightning-input-field 
                                                                field-name={field.apiName}
                                                                class="edit-input"
                                                                variant="label-hidden"
                                                                onchange={handleFieldChange}>
                                                            </lightning-input-field>
                                                        </div>
                                                    </template>
                                                </template>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template if:false={isEditMode}>
                        <div class="slds-section-group">
                            <template for:each={sections} for:item="section">
                                <div key={section.id} class="slds-section slds-is-open">
                                    <h3 class="slds-section__title slds-theme_shade">
                                        <button aria-controls={section.id} aria-expanded="true"
                                            class="slds-button slds-section__title-action" onclick={handleSectionToggle}
                                            data-section-id={section.id}>
                                            <lightning-icon icon-name="utility:switch" size="x-small"
                                                class="slds-section-title-action-icon slds-buttonicon slds-button__icon_left"></lightning-icon>
                                            <span class="slds-truncate" title={section.label}>{section.label}</span>
                                        </button>
                                    </h3>

                                    <div aria-hidden="false" class="slds-section__content" id={section.id}>
                                        <div class="slds-grid slds-wrap slds-p-around_medium">
                                            <template for:each={section.fields} for:item="field">
                                                <template if:true={field.isVisibleByRule}>
                                                    <div key={field.apiName} class={field.columnClass} style="padding: 0 2%;">
                                                        <label for={field.apiName} class="slds-form-element__label">
                                                            <template if:true={field.isRequired}>
                                                                <abbr class="slds-required" aria-hidden="true"
                                                                    title="required">*</abbr>
                                                            </template>
                                                            {field.label} <template if:true={field.helptext}><lightning-helptext style=" vertical-align: bottom;" content={field.helptext}></lightning-helptext></template>
                                                        </label>
                                                        <div class="slds-grid slds-gutters slds-form-element_readonly" style="flex-wrap: wrap;">
                                                            <template if:true={field.isMultiPicklist}>
                                                                <template for:each={field.value} for:item="value">
                                                                    <span key={value} class="slds-badge slds-m-right_small">{value}</span>
                                                                </template>
                                                            </template>
                                                            <template if:false={field.isMultiPicklist}>
                                                                <lightning-output-field class="slds-col slds-size_4-of-5"
                                                                style="display: block;" field-name={field.apiName}
                                                                variant="label-hidden">
                                                                </lightning-output-field>
                                                            </template>
                                                            <template if:true={userHasEditPermission}>
                                                                <template if:false={viewAll}>
                                                                    <template if:false={doNotProcess}>

                                                                        <lightning-button-icon icon-name="utility:edit"
                                                                            variant="bare"
                                                                            class="slds-col  edit-icon slds-text-align_right" 
                                                                            onclick={enableEditMode}>
                                                                        </lightning-button-icon>
                                                                        <!-- slds-size_1-of-5 -->
                                                                    </template>
                                                                </template>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <div class="footer">
                        <div class="button-group">
                            <template if:true={isEditMode}>
                                <lightning-button variant="neutral" label="Cancel" style="margin-right: 0.5%;"
                                    onclick={disableEditMode}></lightning-button>
                                <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                            </template>
                            <template if:false={isEditMode}>
                                <template if:true={userHasEditPermission}>
                                    <template if:false={viewAll}>
                                        <template if:false={doNotProcess}>

                                            <lightning-button variant="brand" label="Edit"
                                                onclick={enableEditMode}></lightning-button>
                                        </template>
                                    </template>
                                </template>
                            </template>
                        </div>
                    </div>
                </lightning-record-edit-form>
            </lightning-accordion>
        </template>
    </div>
</template>
