<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label">{label}</label>
        <div class="slds-form-element__control">
            <div class={comboboxClass} aria-expanded={isOpen} aria-haspopup="listbox" role="combobox">
                <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                    <input type="text"
                           class="slds-input input-class"
                           role="textbox"
                           readonly
                           value={selectedLabel}
                           placeholder={placeholder}
                           onclick={toggleDropdown}
                           onfocusout={handleBlur}
                           disabled={disabled} />
                    <span class="slds-icon_container slds-input__icon slds-input__icon_right">
                        <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Show options"></lightning-icon>
                    </span>
                </div>
                <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                        <template for:each={computedOptions} for:item="opt">
                            <li role="presentation" class="slds-listbox__item" key={opt.value}>
                                <div class={opt.itemClass} role="option" data-value={opt.value} onmousedown={handleOptionSelect}>
                                    <span class="slds-media__body">
                                        <span class="slds-truncate">{opt.label}</span>
                                    </span>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</template>
