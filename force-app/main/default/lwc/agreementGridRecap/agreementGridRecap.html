<template>
    <div class={sectionClass}>

        <!-- Section header — full-width, matches native SF field section header -->
        <h3 class="slds-section__title">
            <button
                class="slds-button slds-section__title-action"
                onclick={handleToggle}
                aria-expanded={isOpen}>
                <lightning-icon
                    icon-name="utility:switch"
                    class="slds-section__title-action-icon slds-button__icon slds-button__icon_left"
                    size="x-small">
                </lightning-icon>
                <span class="slds-truncate" title={labels.Grid_AgreementGridRecap}>
                    {labels.Grid_AgreementGridRecap}
                </span>
            </button>
        </h3>

        <!-- Section content — hidden/shown by aria-hidden -->
        <div aria-hidden={sectionHidden} class="slds-section__content">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text={labels.UI_Loading} size="small">
                </lightning-spinner>
            </template>
            <template if:false={isLoading}>
                <div class="slds-grid slds-wrap slds-gutters_small">

                    <!-- ── Column 1: Current Grid Recap ── -->
                    <div class="slds-col slds-size_1-of-2">
                        <div class="slds-card">
                            <div class="card-header slds-card__header slds-grid">
                                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            <span class="slds-truncate" title={labels.Grid_CurrentGridRecap}>
                                                {labels.Grid_CurrentGridRecap}
                                            </span>
                                        </h2>
                                    </div>
                                </header>
                            </div>
                            <div class="card-body sectionPadding slds-card__body">
                                <template if:true={hasGrid}>
                                    <div class="slds-form slds-form_stacked">
                                        <div class="slds-form-element slds-form-element_stacked slds-hint-parent">
                                            <span class="slds-form-element__label">{labels.Grid_GridName}</span>
                                            <div class="slds-form-element__control">
                                                <a href={gridUrl}>{recap.gridName}</a>
                                            </div>
                                        </div>
                                        <div class="slds-form-element slds-form-element_stacked slds-hint-parent">
                                            <span class="slds-form-element__label">{labels.Grid_AutomaticUpdate}</span>
                                            <div class="slds-form-element__control">
                                                <span class="slds-form-element__static">{automaticUpdateLabel}</span>
                                            </div>
                                        </div>
                                        <div class="slds-form-element slds-form-element_stacked slds-hint-parent">
                                            <span class="slds-form-element__label">
                                                {labels.Grid_StandardGridsSelected} ({standardGridCount})
                                            </span>
                                            <div class="slds-form-element__control">
                                                <template for:each={standardGridGroups} for:item="group">
                                                    <div key={group.key} class="slds-m-bottom_x-small">
                                                        <p class="slds-text-body_small slds-text-color_default slds-m-bottom_xx-small">
                                                            <strong>{group.gridName}</strong>
                                                            <span class="slds-text-color_weak"> ({group.productCount})</span>
                                                        </p>
                                                        <div>
                                                            <template for:each={group.products} for:item="product">
                                                                <span key={product.key} class="badge-hover slds-badge slds-m-right_xx-small slds-m-top_xx-small" title={product.tooltip}>
                                                                    {product.value}
                                                                </span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                <template if:false={hasGrid}>
                                    <p class="slds-text-color_weak slds-p-around_small">
                                        {labels.Grid_NoActiveGridAssigned}
                                    </p>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- ── Column 2: Grid History ── -->
                    <div class="slds-col slds-size_1-of-2">
                        <div class="slds-card">
                            <div class="card-header slds-card__header slds-grid">
                                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="standard:event" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            <span class="slds-truncate" title={labels.Grid_AgreementGridHistory}>
                                                {labels.Grid_AgreementGridHistory} ({historyCount})
                                            </span>
                                        </h2>
                                    </div>
                                </header>
                            </div>
                            <div class="card-body slds-card__body">
                                <template if:true={hasHistory}>
                                    <lightning-datatable
                                        key-field="recordId"
                                        data={historyRows}
                                        columns={historyColumns}
                                        hide-checkbox-column>
                                    </lightning-datatable>
                                </template>
                                <template if:false={hasHistory}>
                                    <p class="slds-text-color_weak slds-p-around_small">No history found.</p>
                                </template>
                            </div>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </div>
</template>
