<template>
    <div class="slds-form-element">
        <label class="slds-form-element__label" for="combobox-id-22">{lookupFieldLabel}</label>
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click" data-id="lookup_input_container">
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" tabindex="0" role="none">
                        <!--START : Lookup Field Search Input -------------------------------------------------------- -->
                        <template if:false={showSelectedOption}>
                            <lightning-input type="search" data-id="lookup_input_field_id" is-loading={isSearchLoading} onclick={toggleResult}
                                onchange={searchLookUpFieldValues} placeholder={objectPluralNamePlaceholder} value={lookupInputValue}
                                variant="label-hidden"></lightning-input>
                            <!--<input type="text" class="slds-input slds-combobox__input" id="combobox-id-22" data-id="lookup_input_field_id" aria-autocomplete="list"
                                aria-controls="listbox-id-14" aria-expanded="false" aria-haspopup="listbox" role="combobox"
                                placeholder={objectPluralNamePlaceholder} value={lookupInputValue} onchange={searchLookUpFieldValues} />-->
                           <!--<span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right">
                                <lightning-icon icon-name="utility:search" alternative-text="Lookup Search" size="x-small" title="Lookup Search"></lightning-icon>
                            </span>-->
                        </template>
                          <!--END : Lookup Field Search Input -------------------------------------------------------- -->
                          <!--START : Option Selection --------------------------------------------------------------- -->
                        <template if:true={showSelectedOption}>
                            <div class="slds-icon_container slds-combobox__input-entity-icon">
                                <lightning-icon icon-name={icon_name} alternative-text={lookup_field_label} title={lookup_field_label}></lightning-icon>
                            </div>
                            <div class="slds-input_faux slds-combobox__input slds-combobox__input-value slds-p-left_x-large">
                                <span class="slds-truncate">{selectedOptionLabel}</span>
                            </div>
                            <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" title="Remove selected option" onclick={removeSelectedOption}>
                                <lightning-icon icon-name="utility:close" alternative-text="Clear Selection" size="xx-small"
                                    title="Clear Selection"></lightning-icon>
                                <span class="slds-assistive-text">Clear Selection</span>
                            </button>
                        </template>
                          <!--EMD : Option Selection ----------------------------------------------------------------- -->
                    </div>
                    <div class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <li role="presentation" class="slds-listbox__item">
                                <div aria-selected="true" class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_term slds-has-focus" role="option">
                                    <span class="slds-media__figure slds-listbox__option-icon">
                                        <lightning-icon icon-name="utility:search" alternative-text="Search for term: " size="x-small" title="Search for term: "></lightning-icon>
                                    </span>
                                    <span class="slds-media__body">
                                        <span class="slds-listbox__option-text slds-listbox__option-text_entity">Show all the results for {finalSearchKey} </span>
                                    </span>
                                </div>
                            </li>
                            <template for:each={serverReturnedValuesArray} for:item="eachReturnedValue">
                                <li key={eachReturnedValue.Id} role="presentation" class="slds-listbox__item" data-id={eachReturnedValue.Id} data-name={eachReturnedValue.Name}
                                    onclick={setLookupInputValue}>
                                    <div class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta"
                                        role="option">
                                        <span class="slds-media__figure slds-listbox__option-icon">
                                            <span class="slds-icon_container">
                                                <lightning-icon icon-name={icon_name} alternative-text={lookup_field_label}
                                                    title={lookup_field_label}></lightning-icon>
                                            </span>
                                        </span>
                                        <span class="slds-media__body">
                                            <span class="slds-listbox__option-text" style="overflow-wrap: break-word;">{eachReturnedValue.Name}</span>
                                            <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">
                                              <!--<template if:true={eachReturnedValue.displayFieldAsSubHeader}>
                                                    {eachReturnedValue.LookUpSubHeaderField}
                                                </template>
                                                <template if:false={eachReturnedValue.displayFieldAsSubHeader}>
                                                    {lookupObjectPluralLabel}
                                                </template> -->
                                                {eachReturnedValue.ISIN_Code__c}
                                            </span>
                                        </span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
