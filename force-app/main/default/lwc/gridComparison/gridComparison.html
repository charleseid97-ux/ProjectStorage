<template>
    <section class="slds-card cardContainer">

        <!-- ── Header ── -->
        <div class="slds-card__header slds-grid headerClass">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name={iconName} size="small" class="relatedIcon"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-truncate">Grid Comparison</span>
                    </h2>
                    <template if:true={selectedGridId}>
                        <p class="slds-text-body_small slds-text-color_weak">
                            <span>{rowCountLabel}</span>
                        </p>
                    </template>
                </div>
            </header>
            <div class="slds-no-flex slds-grid slds-grid_vertical-align-center">
                <template if:true={hasRows}>
                    <lightning-button-group class="slds-m-right_small">
                        <lightning-button label="Show All" variant={showAllVariant} onclick={handleShowAll}></lightning-button>
                        <lightning-button label="Discrepancies Only" variant={discrepanciesVariant} onclick={handleShowDiscrepancies}></lightning-button>
                    </lightning-button-group>
                </template>
                <lightning-button-icon icon-name="utility:refresh" variant="border" alternative-text="Refresh" title="Refresh" onclick={handleRefresh}></lightning-button-icon>
            </div>
        </div>

        <div class="tableContainer">
            <template if:true={isLoading}>
                <div class="centerSpinner">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <div class="slds-card__body slds-card__body_inner">

                <!-- ── Selector ── -->
                <div class="selector-row">
                    <lightning-button-group class="slds-m-right_small lightning-button-group-class">
                        <lightning-button label="By Grid" variant={byGridVariant} onclick={handleModeByGrid}></lightning-button>
                        <lightning-button label="By Agreement" variant={byAgreementVariant} onclick={handleModeByAgreement}></lightning-button>
                    </lightning-button-group>
                    <div class="active-grid-btn-wrapper">
                        <lightning-button label="Active Grid" variant={activeGridVariant} disabled={isActiveGridDisabled} onclick={handleModeByActiveGrid}></lightning-button>
                        <template if:true={activeGridTitle}>
                            <div class="active-grid-tooltip" role="tooltip">{activeGridTitle}</div>
                        </template>
                    </div>

                    <div class="lookup-wrapper">
                        <template if:true={isModeGrid}>
                            <c-multi-select-search-list label="Search grids…" mono-select="true" options={searchOptions} onchange={handleSearchChange}></c-multi-select-search-list>
                        </template>
                        <template if:true={isModeAgreement}>
                            <c-multi-select-search-list label="Search agreements…" mono-select="true" options={searchOptions} onchange={handleSearchChange}></c-multi-select-search-list>
                        </template>
                        <template if:true={selectedLabel}>
                            <div class="selected-pill slds-m-top_xx-small">
                                <lightning-pill label={selectedLabel} onremove={handleClearSelection}></lightning-pill>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ── Errors ── -->
                <template if:true={hasErrors}>
                    <div class="slds-text-color_error slds-m-bottom_small slds-m-horizontal_medium">
                        <ul class="slds-list_dotted">
                            <template for:each={errors} for:item="err">
                                <li key={err}>{err}</li>
                            </template>
                        </ul>
                    </div>
                </template>

                <!-- ── Sections (visible once data is loaded) ── -->
                <template if:true={hasRows}>

                    <!-- ── Overview ── -->
                    <div class={overviewSectionClass}>
                        <h3 class="slds-section__title section-class">
                            <button class="slds-button slds-section__title-action" onclick={handleToggleOverview} aria-expanded={overviewOpen}>
                                <lightning-icon icon-name="utility:switch" class="slds-section__title-action-icon slds-button__icon slds-button__icon_left" size="x-small"></lightning-icon>
                                <span class="slds-truncate" title="Overview">Overview</span>
                            </button>
                        </h3>
                        <div aria-hidden={overviewHidden} class="slds-section__content">
                            <div class="section-padding">
                                <table class="overview-table">
                                    <thead>
                                        <tr>
                                            <th class="ov-th-label"></th>
                                            <th class="ov-th">Weighted Avg Mgt Fee</th>
                                            <th class="ov-th">Mgt Fee (Amt)</th>
                                            <th class="ov-th">Weighted Avg Rebates</th>
                                            <th class="ov-th">Rebates (Amt)</th>
                                            <th class="ov-th">Avg Net Margin</th>
                                            <th class="ov-th">Net Margin (Amt)</th>
                                            <th class="ov-th">Avg Profitability</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={overviewRows} for:item="row">
                                            <tr key={row.key} class={row.rowClass}>
                                                <td class="ov-label">{row.label}</td>
                                                <td class="td-right">{row.fee}</td>
                                                <td class="td-right">{row.feeAmt}</td>
                                                <td class="td-right">{row.rr}</td>
                                                <td class="td-right">{row.rrAmt}</td>
                                                <td class="td-right">{row.nm}</td>
                                                <td class="td-right">{row.nmAmt}</td>
                                                <td class="td-right">{row.pr}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- ── Comparison Details ── -->
                    <div class={detailSectionClass}>
                        <h3 class="slds-section__title section-class">
                            <button class="slds-button slds-section__title-action" onclick={handleToggleDetail} aria-expanded={detailOpen}>
                                <lightning-icon icon-name="utility:switch" class="slds-section__title-action-icon slds-button__icon slds-button__icon_left" size="x-small"></lightning-icon>
                                <span class="slds-truncate" title="Comparison Details">Comparison Details</span>
                            </button>
                        </h3>
                        <div aria-hidden={detailHidden} class="slds-section__content">
                            <div class="section-padding">
                                <div class="slds-scrollable_x">
                                    <table class="grid-table">
                                        <thead>
                                            <!-- Group header row -->
                                            <tr>
                                                <th colspan="7" class="th-group th-blue">Share Class Info</th>
                                                <th class="section-gap"></th>
                                                <th colspan="4" class="th-group th-section1">Rebate Rate</th>
                                                <th class="section-gap"></th>
                                                <th colspan="4" class="th-group th-section2">Net Margin</th>
                                                <th class="section-gap"></th>
                                                <th colspan="4" class="th-group th-section3">Profitability Rate</th>
                                            </tr>
                                            <!-- Column label row -->
                                            <tr>
                                                <th class="th-default sortable" onclick={handleSort} data-sort="portfolio">Portfolio<span class="sort-icon">{sortIndicators.portfolio}</span></th>
                                                <th class="th-default sortable" onclick={handleSort} data-sort="shareClass">Class<span class="sort-icon">{sortIndicators.shareClass}</span></th>
                                                <th class="th-default sortable" onclick={handleSort} data-sort="isin">ISIN<span class="sort-icon">{sortIndicators.isin}</span></th>
                                                <th class="th-default td-right sortable" onclick={handleSort} data-sort="aum">AUM<span class="sort-icon">{sortIndicators.aum}</span></th>
                                                <th class="th-default td-right sortable" onclick={handleSort} data-sort="effMgtFee">Eff. Mgt Fee<span class="sort-icon">{sortIndicators.effMgtFee}</span></th>
                                                <th class="th-default sortable" onclick={handleSort} data-sort="currentStdGrid">Current<span class="sort-icon">{sortIndicators.currentStdGrid}</span></th>
                                                <th class="th-default sortable" onclick={handleSort} data-sort="selectedStdGrid">Selected<span class="sort-icon">{sortIndicators.selectedStdGrid}</span></th>
                                                <th class="section-gap"></th>
                                                <th class="th-sub th-section1 sortable" onclick={handleSort} data-sort="currRR">Current<span class="sort-icon">{sortIndicators.currRR}</span></th>
                                                <th class="th-sub th-section1 sortable" onclick={handleSort} data-sort="selRR">Selected<span class="sort-icon">{sortIndicators.selRR}</span></th>
                                                <th class="th-sub th-section1 sortable" onclick={handleSort} data-sort="diffRRAmt">Diff (Amt)<span class="sort-icon">{sortIndicators.diffRRAmt}</span></th>
                                                <th class="th-sub th-section1 sortable" onclick={handleSort} data-sort="diffRR">Diff (%)<span class="sort-icon">{sortIndicators.diffRR}</span></th>
                                                <th class="section-gap"></th>
                                                <th class="th-sub th-section2 sortable" onclick={handleSort} data-sort="currNM">Current<span class="sort-icon">{sortIndicators.currNM}</span></th>
                                                <th class="th-sub th-section2 sortable" onclick={handleSort} data-sort="selNM">Selected<span class="sort-icon">{sortIndicators.selNM}</span></th>
                                                <th class="th-sub th-section2 sortable" onclick={handleSort} data-sort="diffNMAmt">Diff (Amt)<span class="sort-icon">{sortIndicators.diffNMAmt}</span></th>
                                                <th class="th-sub th-section2 sortable" onclick={handleSort} data-sort="diffNM">Diff (%)<span class="sort-icon">{sortIndicators.diffNM}</span></th>
                                                <th class="section-gap"></th>
                                                <th class="th-sub th-section3 sortable" onclick={handleSort} data-sort="currPR">Current<span class="sort-icon">{sortIndicators.currPR}</span></th>
                                                <th class="th-sub th-section3 sortable" onclick={handleSort} data-sort="selPR">Selected<span class="sort-icon">{sortIndicators.selPR}</span></th>
                                                <th class="th-sub th-section3 sortable" onclick={handleSort} data-sort="diffPRAmt">Diff (Amt)<span class="sort-icon">{sortIndicators.diffPRAmt}</span></th>
                                                <th class="th-sub th-section3 sortable" onclick={handleSort} data-sort="diffPR">Diff (%)<span class="sort-icon">{sortIndicators.diffPR}</span></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={visibleRows} for:item="row">
                                                <tr key={row.key} class={row.rowClass}>
                                                    <td>{row.portfolio}</td>
                                                    <td>{row.shareClass}</td>
                                                    <td>{row.isin}</td>
                                                    <td class="td-right">{row.aum}</td>
                                                    <td class="td-right">{row.effMgtFee}</td>
                                                    <td class="td-current">{row.currentStdGrid}</td>
                                                    <td class="td-selected">{row.selectedStdGrid}</td>
                                                    <td class="section-gap"></td>
                                                    <td class="td-right td-current has-tooltip">{row.currRR}<template if:true={row.currRRAmt}><span class="cell-tooltip">{row.currRRAmt}</span></template></td>
                                                    <td class="td-right td-selected has-tooltip">{row.selRR}<template if:true={row.selRRAmt}><span class="cell-tooltip">{row.selRRAmt}</span></template></td>
                                                    <td class={row.diffRRAmtClass}>{row.diffRRAmt}</td>
                                                    <td class={row.diffRRClass}>{row.diffRR}</td>
                                                    <td class="section-gap"></td>
                                                    <td class="td-right td-current has-tooltip">{row.currNM}<template if:true={row.currNMAmt}><span class="cell-tooltip">{row.currNMAmt}</span></template></td>
                                                    <td class="td-right td-selected has-tooltip">{row.selNM}<template if:true={row.selNMAmt}><span class="cell-tooltip">{row.selNMAmt}</span></template></td>
                                                    <td class={row.diffNMAmtClass}>{row.diffNMAmt}</td>
                                                    <td class={row.diffNMClass}>{row.diffNM}</td>
                                                    <td class="section-gap"></td>
                                                    <td class="td-right td-current has-tooltip">{row.currPR}<template if:true={row.currPRAmt}><span class="cell-tooltip">{row.currPRAmt}</span></template></td>
                                                    <td class="td-right td-selected has-tooltip">{row.selPR}<template if:true={row.selPRAmt}><span class="cell-tooltip">{row.selPRAmt}</span></template></td>
                                                    <td class={row.diffPRAmtClass}>{row.diffPRAmt}</td>
                                                    <td class={row.diffPRClass}>{row.diffPR}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                </template>

                <!-- ── Empty state ── -->
                <template if:false={hasRows}>
                    <template if:false={selectedGridId}>
                        <p class="slds-text-color_weak selectAgrGridCls">Select a grid or agreement above to start the comparison.</p>
                    </template>
                    <template if:true={selectedGridId}>
                        <template if:false={isLoading}>
                            <p class="slds-text-color_weak selectAgrGridCls">No grid details found.</p>
                        </template>
                    </template>
                </template>

            </div>
        </div>
    </section>
</template>
