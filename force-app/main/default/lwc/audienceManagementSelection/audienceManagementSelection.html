<template>
    <template if:true={showSpinner}>
        <div class="">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>
    <!-- Modal for the children filters of the Customer Interests filter -->
    <template lwc:if={childModalOpened}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse">
                    <lightning-icon class="white-icon" icon-name="utility:close" alternative-text="Close"
                        title="Close" onclick={closeModalChild}></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <div class="slds-modal__header">
                    <h1 class="slds-modal__title slds-hyphenate">{childModalTitle}</h1>
                </div>
                <div class="slds-modal__content slds-var-p-around_medium" style="height:500px;overflow-x:scroll;">
                    <div data-id="interestContainer">
                        <template for:each={childModalFilters} for:item="filter">
                            <lightning-input key={filter.name} data-id={filter.name} type="checkbox" message-toggle-active="" message-toggle-inactive=""
                                checked={filter.checked} name={filter.fieldName} label={filter.label} onchange={handleChangeToggle}>
                            </lightning-input>
                        </template>
                    </div>
                </div>
                <div class="slds-modal__footer" data-id="modal_buttons_container">
                    <button class="slds-button slds-button_neutral" name="Close" onclick={closeModalChild}>Close</button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
    <lightning-card>
        <div class="slds-var-m-around_medium slds-grid">
            <div class="slds-col slds-text-align_left slds-text-heading_medium">
                Available filters
            </div>
            <div class="slds-col slds-text-align_right">
                <lightning-button-group>
                    <lightning-button label="Reset filters" icon-name="utility:rotate" onclick={handleClickReset}></lightning-button>
                    <lightning-button label="Search results" icon-name="utility:play" onclick={handleClickRun}></lightning-button>
                </lightning-button-group>
            </div>
        </div>
        <lightning-accordion allow-multiple-sections-open
                             active-section-name={activeSections}>
            <!-- Contact and Company filters Section -->
            <lightning-accordion-section name="ContactCompany" label="Contact and Company filters">
                <div class="slds-grid slds-wrap">
                    <template for:each={contactCompanyFilters} for:item="filter">
                        <div class="slds-col slds-size_1-of-4 " key={filter.name}>
                            <div class="slds-var-m-around_x-small">
                                <template if:true={filter.isPicklist}>
                                    <lightning-combobox label={filter.label} data-id={filter.name} options={filter.picklistValues} onchange={handleChangePicklist}>
            
                                    </lightning-combobox>
                                </template>
                                <template if:true={filter.isMultipicklist}>
                                    <lightning-dual-listbox label={filter.label} data-id={filter.name} options={filter.picklistValues} onchange={handleChangeMultipicklist}>
                                    </lightning-dual-listbox>
                                </template>
                                <template if:true={filter.isText}>
                                    <lightning-input type="text" label={filter.label} data-id={filter.name} onchange={handleChangeText}></lightning-input>
                                </template>
                                <template if:true={filter.isDate}>
                                    <lightning-input type="date" label={filter.label} data-id={filter.name} onchange={handleChangeDate}></lightning-input>
                                </template>
                                <template if:true={filter.isCheckbox}>
                                    <div class="slds-grid slds-var-m-top_x-large">
                                        <div class="slds-col slds-size_1-of-4">
                                            <span class="slds-form-element__label slds-m-bottom_none">{filter.label}</span>
                                        </div>
                                        <div class="slds-col slds-size_1-of-4">
                                            <lightning-input type="toggle" data-id={filter.name} message-toggle-active="" message-toggle-inactive="" label=""
                                                onchange={handleChangeToggle}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </template>
                            </div>                            
                        </div>                    
                    </template>
                    <!-- Company owner filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <div class="slds-var-m-around_x-small">
                            <template if:true={allUsers}>
                                <template if:true={selectedUser}>
                                    <label class="slds-form-element__label">Company Owner</label>
                                    <div class="slds-pill-container slds-border_right slds-border_top slds-border_bottom slds-border_left slds-var-p-top_xxx-small" style="border-radius: 0.25rem;min-height: 2rem;">
                                        <lightning-pill
                                                id={selectedUser.id}
                                                label={selectedUser.name}
                                                onremove={handleRemoveSelectedUser}
                                        >
                                        <lightning-icon
                                                icon-name="standard:user"
                                                size="medium"></lightning-icon>
                                        </lightning-pill>
                                    </div>
                                </template>
                                <template if:false={selectedUser}>
                                    <c-multi-select-search-list label="Company Owner" mono-select="true" options={allUsers} value={selectedUser} onchange={handleUsers}>
                                    </c-multi-select-search-list>
                                </template>
                            </template>
                        </div>
                    </div>
                    <!-- Company is owned by the current user filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <div class="slds-var-m-around_x-small">
                            <div class="slds-grid slds-var-m-top_x-large">
                                <div class="slds-col slds-size_1-of-4">
                                    <span class="slds-form-element__label slds-m-bottom_none">My Companies</span>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input type="toggle" data-id="myCompanyFilter" message-toggle-active="" message-toggle-inactive="" label=""
                                       checked={myCompanyFilter} onchange={handleChangeMyCompany}>
                                    </lightning-input>
                                </div>
                            </div>
                        </div>                        
                    </div>
                    <!-- Company is in my team filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <div class="slds-var-m-around_x-small">
                            <div class="slds-grid slds-var-m-top_x-large">
                                <div class="slds-col slds-size_1-of-3">
                                    <span class="slds-form-element__label slds-m-bottom_none">My Team's companies</span>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input type="toggle" data-id="myTeamCompanyFilter" message-toggle-active="" message-toggle-inactive="" label=""
                                       checked={myTeamCompanyFilter} onchange={handleChangeMyTeamCompany}>
                                    </lightning-input>
                                </div>
                            </div>
                        </div>                        
                    </div>                                    
                </div>                
            </lightning-accordion-section>

            <!-- Product Interests filters section -->
            <lightning-accordion-section name="ProdInterest" label="Product Interest Management">
                <div class="slds-grid slds-wrap">
                    <!-- Product lookup filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <div class="slds-var-m-around_x-small">
                            <template if:true={allProducts}>
                                <template if:true={selectedProduct}>
                                    <label class="slds-form-element__label">Product</label>
                                    <div class="slds-pill-container slds-border_right slds-border_top slds-border_bottom slds-border_left slds-var-p-top_xxx-small" style="border-radius: 0.25rem;min-height: 2rem;">
                                        <lightning-pill
                                                id={selectedProduct.id}
                                                label={selectedProduct.name}
                                                onremove={handleRemoveSelectedProduct}
                                        >
                                        <lightning-icon
                                                icon-name="custom:custom5"
                                                size="medium"></lightning-icon>
                                        </lightning-pill>
                                    </div>
                                </template>
                                <template if:false={selectedProduct}>
                                    <c-multi-select-search-list label="Product" mono-select="true" options={allProducts} value={selectedProduct} more-searching-fields={productSearchFields} onchange={handleProducts}>
                                    </c-multi-select-search-list>
                                </template>
                            </template>                            
                        </div>                        
                    </div>
                    <!-- Meeting from date filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <div class="slds-var-m-around_x-small">
                            <lightning-input type="date" label="Meeting from" onchange={handleChangeDateProduct}></lightning-input>
                        </div>                                              
                    </div>
                    <!-- Product interest rating filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <template if:true={selectedProduct}>
                            <div class="slds-var-m-around_x-small">
                                <div class="slds-grid slds-var-m-top_x-large">
                                    <div class="slds-col slds-size_1-of-3">
                                        <span class="slds-form-element__label slds-m-bottom_none">Interest over</span>
                                    </div>
                                    <div class="slds-col slds-size_2-of-3">                                    
                                        <c-stars-rating selected-rating={selectedRating} onratingclick={handleRating}></c-stars-rating>
                                    </div>
                                </div>
                            </div> 
                        </template>                                               
                    </div>
                    <!-- Product invested filter -->
                    <div class="slds-col slds-size_1-of-4">
                        <template if:true={selectedProduct}>
                            <div class="slds-grid slds-var-m-top_x-large">
                                <div class="slds-col slds-size_1-of-4">
                                    <span class="slds-form-element__label slds-m-bottom_none">Invested</span>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <lightning-input type="toggle" message-toggle-active="" message-toggle-inactive="" label=""
                                        onchange={handleChangeInvested}>
                                    </lightning-input>
                                </div>
                            </div>
                        </template>                        
                    </div>                    
                </div>                
            </lightning-accordion-section>

            <!-- Event Preferences filter section -->
            <lightning-accordion-section name="EventPreferences" label="Event Preferences">
                <div class="slds-grid slds-wrap">
                    <template for:each={eventPrefFilters} for:item="filter">
                        <div class="slds-col slds-size_1-of-3" key={filter.name}>
                            <div class="slds-var-m-around_x-small">
                                <template if:true={filter.isPicklist}>
                                    <lightning-combobox label={filter.label} data-id={filter.name} options={filter.picklistValues} onchange={handleChangePicklist}>
            
                                    </lightning-combobox>
                                </template>                                
                                <template if:true={filter.isMultipicklist}>
                                    <lightning-dual-listbox label={filter.label} data-id={filter.name} options={filter.picklistValues} onchange={handleChangeMultipicklist}>
                                    </lightning-dual-listbox>
                                </template>
                                <template if:true={filter.isText}>
                                    <lightning-input type="text" label={filter.label} data-id={filter.name} onchange={handleChangeText}></lightning-input>
                                </template>
                                <template if:true={filter.isDate}>
                                    <lightning-input type="date" label={filter.label} data-id={filter.name} onchange={handleChangeDate}></lightning-input>
                                </template>
                                <template if:true={filter.isCheckbox}>
                                    <div class="slds-grid slds-var-m-top_x-small slds-var-m-bottom_x-small">
                                        <div class="slds-col slds-size_1-of-3">
                                            <span class="slds-form-element__label slds-m-bottom_none">{filter.label}</span>
                                        </div>
                                        <div class="slds-col slds-size_1-of-4">
                                            <lightning-input type="toggle" data-id={filter.name} message-toggle-active="" message-toggle-inactive="" label=""
                                                onchange={handleChangeToggle}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </template>
                            </div>            
                        </div>        
                    </template>               
                </div>
            </lightning-accordion-section>

            <!-- Customer Interests filters section -->
            <lightning-accordion-section name="CustInterest" label="Customer Interests">
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_1-of-3">
                        <template for:each={preferencesFilters} for:item="filter">                                
                            <template if:true={filter.isCheckbox}>
                                <div class="slds-grid slds-var-m-top_x-small slds-var-m-bottom_x-small" key={filter.name}>
                                    <template if:true={filter.hasChildren}>
                                        <div class="slds-col slds-size_1-of-8">
                                            <span class="slds-form-element__label">
                                                <lightning-button-icon icon-name="utility:edit" size="small"
                                                    variant="bare" alternative-text="Open Pop-Up"
                                                    title="Open Pop-Up" onclick={handleOpenChildrenModal} aria-label={filter.name}
                                                    tooltip="Preferences have been created. Click here to View." label="">
                                                </lightning-button-icon>
                                            </span>
                                        </div>                                            
                                    </template>
                                    <div class="slds-col slds-size_1-of-3">
                                        <span class="slds-form-element__label slds-m-bottom_none">{filter.label}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-4">
                                        <lightning-input type="toggle" data-id={filter.name} message-toggle-active="" message-toggle-inactive="" label=""
                                            onchange={handleChangeToggle}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </template>                   
                        </template>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <template for:each={otherInterestsFilters} for:item="filter">                                
                            <template if:true={filter.isCheckbox}>
                                <div class="slds-grid slds-var-m-top_x-small slds-var-m-bottom_x-small" key={filter.name}>
                                    <template if:true={filter.hasChildren}>
                                        <div class="slds-col slds-size_1-of-8">
                                            <span class="slds-form-element__label">
                                                <lightning-button-icon icon-name="utility:edit" size="small"
                                                    value={filter.name} variant="bare" alternative-text="Open Pop-Up"
                                                    title="Open Pop-Up" onclick={handleOpenChildrenModal} aria-label={filter.name}
                                                    tooltip="Preferences have been created. Click here to View." label="">
                                                </lightning-button-icon>
                                            </span>
                                        </div>                                            
                                    </template>
                                    <div class="slds-col slds-size_1-of-3">
                                        <span class="slds-form-element__label slds-m-bottom_none">{filter.label}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-4">
                                        <lightning-input type="toggle" data-id={filter.name} message-toggle-active="" message-toggle-inactive="" label=""
                                            onchange={handleChangeToggle}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </template>                   
                        </template>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <template for:each={regionsFilters} for:item="filter">                                
                            <template if:true={filter.isCheckbox}>
                                <div class="slds-grid slds-var-m-top_x-small slds-var-m-bottom_x-small" key={filter.name}>
                                    <template if:true={filter.hasChildren}>
                                        <div class="slds-col slds-size_1-of-8">
                                            <span class="slds-form-element__label">
                                                <lightning-button-icon icon-name="utility:edit" size="small"
                                                    value={filter.name} variant="bare" alternative-text="Open Pop-Up"
                                                    title="Open Pop-Up" onclick={handleOpenChildrenModal} aria-label={filter.name}
                                                    tooltip="Preferences have been created. Click here to View." >
                                                </lightning-button-icon>
                                            </span>
                                        </div>                                            
                                    </template>
                                    <div class="slds-col slds-size_1-of-3">
                                        <span class="slds-form-element__label slds-m-bottom_none">{filter.label}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-4">
                                        <lightning-input type="toggle" data-id={filter.name} message-toggle-active="" message-toggle-inactive="" label=""
                                            onchange={handleChangeToggle}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </template>                   
                        </template>
                    </div>
                </div>
            </lightning-accordion-section>
        </lightning-accordion>
    </lightning-card>
</template>
