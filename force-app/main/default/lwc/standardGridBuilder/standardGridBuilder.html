<template>
    <lightning-card title={labels.Grid_Builder}>
        <template if:true={isLoading}>
            <div class="centerSpinner">
                <lightning-spinner alternative-text={labels.UI_Loading} size="medium"></lightning-spinner>
            </div>
        </template>
        <div class="mainDiv">
            <template if:true={showAgreementsPage}>
                <c-grid-agreements-selection agreement-selection-mode={agreementSelectionMode}
                                             options={agreementOptions}
                                             value={selectedAgreements}
                                             available-teams={availableTeams}
                                             primary-team={primaryTeam}
                                             selected-team={selectedTeam}
                                             start-date={agreementStartDate}
                                             rec-id={recId}
                                             onagreementsnext={handleAgreementsNext}>
                </c-grid-agreements-selection>
            </template>

            <template if:true={isGridBuilderOrValidationPage}>
                <template if:true={showGridBuilderPage}>
                    <div class="gridBuilderClass">
                        <div class="builderLeftSection">
                            <c-filter-builder object-options={objectOptions}
                                            filter-logic-options={filterLogicOptions}
                                            show-values-when-not-selecting={showValuesWhenNotSelecting}
                                            filter-value-separator={filterValueSeparator}
                                            fields-by-object={fieldsByObject}
                                            default-filter-operator={defaultFilterOperator}
                                            operators-by-field={operatorsByField}
                                            picklist-values-by-field={picklistValuesByField}
                                            filter-limit={filterLimit}
                                            starting-logic-type={startingLogicType}
                                            filter-picklist-empty-val={filterPicklistEmptyVal}
                                            onapplyfilters={handleApplyFilters}
                                            onresetfilters={handleFilterReset}>
                            </c-filter-builder>

                            <div class="displayFlex_ColumnGap">
                                <div class="slds-col granularColumn">
                                    <div class="slds-col slds-size_2-of-12">
                                        <c-custom-combobox name="grid"
                                                          value={selectedGrid}
                                                          options={computedGridOptions}
                                                          label={labels.Grid_Label}
                                                          onchange={handleGridChange}>
                                        </c-custom-combobox>
                                    </div>
                                    <div class="granularColumn">
                                        <lightning-button label={labels.Grid_AddToGrid} variant="brand" onclick={handleAddAllToSelection} disabled={addToGridDisabled}></lightning-button>
                                        <lightning-button label={labels.Grid_ResetAll} variant="destructive" onclick={handleResetAllClick}></lightning-button>
                                        <lightning-button label={labels.Grid_ViewRecap} variant="neutral" onclick={handleOpenSelectedPanel}></lightning-button>
                                        <template if:true={showBackToAgreementSelectionBtn}>
                                            <lightning-button label={labels.UI_Back} variant="neutral" onclick={handleBackToAgreementSelection}></lightning-button>
                                        </template>
                                        <lightning-button label={labels.UI_Next} variant="brand" onclick={handleGridValidation} disabled={validateGridDisabled}></lightning-button>
                                    </div>
                                    <div>
                                        <div class="toggle-header">
                                            <span class="toggle-label">{labels.Grid_AutoIncludeLabel}</span>
                                            <lightning-helptext
                                                content={labels.Grid_AutoIncludeHelpText}>
                                            </lightning-helptext>
                                        </div>
                                        <div class="toggle-row">
                                            <lightning-input type="toggle"
                                                            variant="label-hidden"
                                                            message-toggle-active=""
                                                            message-toggle-inactive=""
                                                            checked={isAutoGridUpdate}
                                                            disabled={isToggleDisabled}
                                                            onchange={handleGridUpdateToggle}>
                                            </lightning-input>
                                            <span class="message-toggle-label">
                                                {toggleLabel}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="builderRightSection">
                            <c-grid-share-type-selector all-share-type-options={allShareTypeOptions}
                                                        selected-share-types={selectedShareTypes}
                                                        enabled-share-type-values={enabledShareTypeValues}
                                                        onsharetypeschanged={handleShareTypeSelection}
                                                        onenabledchanged={handleEnabledShareTypesChanged}>
                            </c-grid-share-type-selector>
                        </div>
                    </div>

                    <c-results-table columns={resultColumns}
                                    rows={shareClasses}
                                    selected-share-classes={selectedShareClasses}
                                    onremoveproduct={handleRemoveProductFromResults}>
                    </c-results-table>
                </template>

                <template if:true={showValidationPage}>
                    <c-grid-validation-page grid-builder-setting-name={gridBuilderSettingName}
                                            countries-of-distribution={countriesOfDistribution}
                                            selected-share-classes={selectedShareClasses}
                                            selected-agreements={selectedAgreements}
                                            criteria-list={criteriaList}
                                            is-auto-grid-update={isAutoGridUpdate}
                                            agreement-start-date={agreementStartDate}
                                            agreement-names={selectedAgreementNames}
                                            onselectionchange={handleValidationSelectionChange}
                                            onremoveproduct={handleRemoveProductFromSelection}
                                            onviewrecap={handleOpenSelectedPanelFromValidation}
                                            onback={handleBackToBuilder}
                                            ongridsaved={handleGridSaved}>
                    </c-grid-validation-page>
                </template>
                <!-- RIGHT COLUMN: Selected products panel -->
                <c-grid-selection-display-panel columns={selectedResultColumns}
                                                rows={selectedShareClasses}
                                                all-rows={allQueriedShareClasses}
                                                criteria-list={criteriaList}
                                                show-excluded-only={showRecapExcludedOnly}
                                                is-open={showSelectedPanel}
                                                onremoveproduct={handleRemoveProductFromSelection}
                                                onclose={handleCloseSelectedPanel}>
                </c-grid-selection-display-panel>
            </template>
        </div>
        <c-modal is-visible-modal={showConfirmationModal}
                 confirm-button-label={labels.UI_Confirm}
                 close-button-label={labels.UI_Cancel}
                 onconfirm={handleConfirmationConfirm}
                 onclose={handleConfirmationCancel}>
            <h2 slot="header">{confirmationContext.title}</h2>
            <p slot="body">{confirmationContext.message}</p>
        </c-modal>
    </lightning-card>
</template>
