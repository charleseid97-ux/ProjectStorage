<template>
  <lightning-card title="Grid Excel Import">
    <div class="slds-p-around_medium">
      <lightning-input
        type="file"
        accept={acceptedFormats}
        label="Select Excel file"
        onchange={handleFileChange}
      ></lightning-input>
      <div class="slds-m-top_small">
        <lightning-button
          variant="brand"
          label="Import"
          onclick={handleImport}
          disabled={isLoading}
        ></lightning-button>
      </div>
      <template if:true={isLoading}>
        <div class="slds-m-top_small">
          <lightning-spinner size="small"></lightning-spinner>
        </div>
      </template>
      <template if:true={hasErrors}>
        <div class="slds-m-top_medium slds-text-color_error">
          <p>Validation errors:</p>
          <ul class="slds-list_dotted">
            <template for:each={errors} for:item="err">
              <li key={err}>{err}</li>
            </template>
          </ul>
        </div>
      </template>
      <template if:true={result}>
        <div class="slds-m-top_medium">
          <p>Scopes upserted: {result.scopesUpserted}</p>
          <p>Criteria created: {result.criteriaCreated}</p>
          <p>Criteria details created: {result.criteriaDetailsCreated}</p>
          <p>Rule lines created: {result.ruleLinesCreated}</p>
        </div>
        <template if:true={hasResultErrors}>
          <div class="slds-m-top_medium slds-text-color_error">
            <p>Row errors:</p>
            <ul class="slds-list_dotted">
              <template for:each={result.errors} for:item="err">
                <li key={err.key}>
                  [{err.sheetName} row {err.rowNumber}] {err.message}
                </li>
              </template>
            </ul>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
