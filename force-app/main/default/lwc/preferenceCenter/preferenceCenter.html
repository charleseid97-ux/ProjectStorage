<template>
    <lightning-card>
        <!-- START : Opt Out Toggle -->
        <div class="slds-clearfix">
            <div class="slds-form-element slds-p-around_x-small slds-float_left">
                <label class="slds-checkbox_toggle slds-grid">
                    <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12 slds-text-align_right">
                        <span class="slds-form-element__label slds-m-bottom_none">Opt out from all emails</span>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                        <lightning-input data-id="optOut" type="toggle" message-toggle-active="" message-toggle-inactive="" label=""
                            name="HasOptedOutOfEmail" onchange={updateToggleOptOut} checked={optOut.data}></lightning-input>
                    </div>
                </label>
                <div class="slds-p-around_x-small slds-text-align_center">
                    {lastModifiedDateOptOut.data}
                </div>
                <template lwc:if={isOptOutLoading}>
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </template>
            </div>
        </div>
        <!-- END : Opt Out Toggle -->
        <div class="slds-p-top_small slds-p-bottom_medium">
            <div class="slds-grid slds-wrap">
                <!-- START : Assets class / funds preferences Section -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12 slds-p-bottom_xx-large">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="slds-text-title_bold slds-text-align_center slds-p-bottom_large">
                            Asset Class
                        </div>
                        <template lwc:if={isPreferenceLoading}>
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </template>
                        <template for:each={preferences} for:item="preference">
                            <div key={preference} class="slds-form-element slds-p-around_x-small slds-align_absolute-center">
                                <label class="slds-checkbox_toggle slds-grid">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12 slds-text-align_right">
                                        <span class="slds-form-element__label">
                                            <lightning-button-icon icon-name="utility:edit" size="small"
                                                value={preference.checkboxAPI} variant="bare" alternative-text="Preference"
                                                title="Preference" onclick={openModal} aria-label={preference.checkboxLabel}
                                                tooltip="Edit Interests">
                                            </lightning-button-icon>
                                        </span>
                                        <span class="slds-form-element__label slds-m-bottom_none">{preference.checkboxLabel}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                                        <lightning-input data-id={preference.checkboxAPI} type="toggle" value={preference.checkboxAPI} message-toggle-active="" message-toggle-inactive="" label=""
                                            name={preference.checkboxAPI} aria-label={preference.checkboxLabel} onchange={updateTogglePreference} checked={preference.checkboxValue}>
                                        </lightning-input>
                                    </div>
                                </label>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- END : Preference Section -->
                <!-- START : Other interests Section -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="slds-text-title_bold slds-text-align_center slds-p-bottom_large">
                            Other Interests
                        </div>
                        <template lwc:if={isInterestLoading}>
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </template>
                        <template for:each={interests} for:item="interest">
                            <div key={interest} class="slds-form-element slds-p-around_x-small">
                                <label class="slds-checkbox_toggle slds-grid">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12 slds-text-align_right">
                                        <span class="slds-form-element__label slds-m-bottom_none">{interest.checkboxLabel}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                                        <lightning-input data-id={interest.checkboxAPI} aria-label="interestLabel" type="toggle" message-toggle-active="" message-toggle-inactive=""
                                            name={interest.checkboxAPI} onchange={updateToggleInterest} checked={interest.checkboxValue}>
                                        </lightning-input>
                                    </div>
                                </label>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- END : Other interests Type -->
                <!-- START : Region Section -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="slds-text-title_bold slds-text-align_center slds-p-bottom_large">
                            Region
                        </div>
                        <template lwc:if={isRegionLoading}>
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </template>
                        <template for:each={regions} for:item="region">
                            <div key={region} class="slds-form-element slds-p-around_x-small">
                                <label class="slds-checkbox_toggle slds-grid">
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12 slds-text-align_right">
                                        <span class="slds-form-element__label slds-m-bottom_none">{region.checkboxLabel}</span>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                                        <lightning-input data-id={region.checkboxAPI} aria-label="regionLabel" type="toggle" message-toggle-active="" message-toggle-inactive=""
                                            name={region.checkboxAPI} onchange={updateToggleInterest} checked={region.checkboxValue}>
                                        </lightning-input>
                                    </div>
                                </label>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- END : Region Type -->
            </div>
        </div>
    </lightning-card>
    <!--START: Display Modal-->
    <template lwc:if={isModalDisplayed}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse">
                    <lightning-icon class="white-icon" icon-name="utility:close" alternative-text="Close"
                        title="Close" onclick={closeModal}></lightning-icon>
                    <span class="slds-assistive-text">Cancel</span>
                </button>
                <div class="slds-modal__header">
                    <h1 class="slds-modal__title slds-hyphenate">{modalTitle}</h1>
                </div>
                <div class="slds-modal__content slds-p-around_medium" style="height:500px;overflow-x:scroll;">
                    <div data-id="interestContainer">
                        <template for:each={subinterests} for:item="subinterest">
                            <lightning-input key={subinterest} data-id={subinterest.checkboxAPI} type="checkbox" message-toggle-active="" message-toggle-inactive=""
                                name={subinterest.checkboxAPI} label={subinterest.checkboxLabel} checked={subinterest.checkboxValue}>
                            </lightning-input>
                        </template>
                    </div>
                    <template if:true={isInterestLoading}>
                        <div class="spinnerContainer">
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </div>
                    </template>
                </div>
                <div class="slds-modal__footer" data-id="modal_buttons_container">
                    <button class="slds-button slds-button_neutral" name="Close" onclick={closeModal}>Cancel</button>
                    <button class="slds-button slds-button_brand" name="Save" onclick={saveModal}>Save</button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </template>
    <!--END: Display Modal-->
</template>
