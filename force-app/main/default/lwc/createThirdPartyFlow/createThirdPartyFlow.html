<template>
    <div class="slds-p-around_medium slds-text-align_right slds-text-color_weak">
        <lightning-button label="Create Third Party" onclick={openModal}></lightning-button>

    </div>
    <template if:true={isModalOpen}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-modal__close" onclick={closeModal}>×</button>
                    <h2 class="slds-text-heading_medium">Assign Third Party</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow
                        flow-api-name="NewThirdPartyRole"
                        flow-input-variables={inputVariables}
                        onstatuschange={handleFlowStatusChange}>
                    </lightning-flow>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
