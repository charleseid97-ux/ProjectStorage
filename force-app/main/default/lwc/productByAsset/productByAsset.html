<template>
    <lightning-layout-item flexibility="auto" padding="around-small" class="custom-box">

        <template if:false={switchTo}>
            
            <div class="slds-float_right">
                <lightning-button     label="Filter List by Product"
                                      title="Filter List by Product" 
                                      alternative-text="Show menu" 
                                      icon-name="utility:filterList" 
                                      onclick={clickFilter}>
                </lightning-button>
            </div>
            <c-chart type="line" responsive="true">

                 <c-dataset labels={months}>
                    <template if:true={mapData}>
                        <template for:each={mapData} for:item="mapKey">
                              <c-data   key={mapKey.key} 
                                        label={mapKey.key} 
                                        detail={mapKey.value.v}
                                        backgroundcolor={mapKey.value.backgroundcolor} 
                                        bordercolor={mapKey.value.backgroundcolor} 
                                        stack="1" 
                                        fill="false">
                              </c-data>
                        </template>
                    </template>
                </c-dataset>
        
                <c-legend position="right" 
                    display={showFilter}>
                </c-legend> 
                <c-title 
                    text="Products by Month">
                </c-title>
        
            </c-chart>
        </template>

    </lightning-layout-item>
</template>
