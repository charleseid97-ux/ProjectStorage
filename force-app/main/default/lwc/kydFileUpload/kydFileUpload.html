<!-- Kyd File Upload -->
<template>
    <lightning-card title="Upload File" class="slds-card slds-card_boundary custom_block" icon-name="standard:document">
        <div class="slds-grid_align-center center_button">
        <lightning-file-upload
                name="fileUploader"
                accept={acceptedFormats}
                record-id={recordId}
                onuploadfinished={handleUploadFinished}
                >
        </lightning-file-upload>
        </div>
    </lightning-card>
</template>
