# -------------------------------------------------------------------
# Salesforce CI/CD - UAT Deploy (NoTestRun) + PROD Validation (Dry Run)
# + SonarCloud analysis sur scope package.xml
#
# Branch routing :
#  - uat      => UAT Stage        (Deploy_UAT + Sonar_Analysis_UAT)
#  - release  => PROD_Validate    (Validate_PROD_DryRun + Sonar_Analysis_PROD)
#  - main     => PROD_Validate    (Validate_PROD_DryRun + Sonar_Analysis_PROD)
# -------------------------------------------------------------------

trigger:
  branches:
    include:
      - uat
      - release
      - main

pr:
  branches:
    include:
      - uat
      - release
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ajuste le niveau de tests pour la validation PROD
  TEST_LEVEL_PROD: 'RunLocalTests' # ou 'RunAllTestsInOrg'

stages:

# =========================
# Stage 1 : UAT 
# =========================
- stage: UAT
  displayName: 'UAT Stage'
  condition: |
    or(
      eq(variables['Build.SourceBranch'], 'refs/heads/uat'),
      eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/uat')
    )
  jobs:
    # ---------------------------------------
    # Job 0 : Analyse Sonar sur le scope package.xml
    # (s'exécute dès que le stage UAT s'exécute : push ou PR vers uat)
    # ---------------------------------------
    - job: Sonar_Analysis_UAT
      displayName: 'SonarCloud analysis (scope = package.xml)'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
          fetchDepth: 0

        # Install xmlstarlet pour lire le package.xml
        - script: |
            set -euo pipefail
            sudo apt-get update -y
            sudo apt-get install -y xmlstarlet
          displayName: 'Install xmlstarlet'

        # Construire un répertoire filtré contenant UNIQUEMENT le code analysable
        # à partir du package.xml (ApexClass / ApexTrigger, extensible si besoin)
        - script: |
            set -euo pipefail
            set -x

            MANIFEST="manifest/package.xml"
            SONAR_ROOT="sonar-scope"

            [[ -f "$MANIFEST" ]] || { echo "ERREUR: $MANIFEST introuvable"; exit 21; }

            rm -rf "$SONAR_ROOT"
            mkdir -p "$SONAR_ROOT"

            # Parcours de tous les <types> du package.xml
            while IFS=';' read -r TYPE MEMBER; do
              case "$TYPE" in
                ApexClass)
                  SRC="force-app/main/default/classes/${MEMBER}.cls"
                  ;;
                ApexTrigger)
                  SRC="force-app/main/default/triggers/${MEMBER}.trigger"
                  ;;
                # TODO : ajouter d'autres metadata "code" si souhaité :
                # ApexPage) SRC="force-app/main/default/pages/${MEMBER}.page" ;;
                # ApexComponent) SRC="force-app/main/default/components/${MEMBER}.component" ;;
                # LightningComponentBundle) SRC="force-app/main/default/lwc/${MEMBER}" ;;
                # AuraDefinitionBundle) SRC="force-app/main/default/aura/${MEMBER}" ;;
                *)
                  SRC=""
                  ;;
              esac

              if [[ -n "$SRC" && -e "$SRC" ]]; then
                DEST="$SONAR_ROOT/$SRC"
                mkdir -p "$(dirname "$DEST")"
                cp -R "$SRC" "$DEST"
              else
                echo "INFO: Pas de fichier source pour $TYPE / $MEMBER (ignoré)."
              fi
            done < <(
              xmlstarlet sel -t \
                -m "//*[local-name()='types']" \
                -v "concat(normalize-space(./*[local-name()='name']),';',./*[local-name()='members'])" -n \
                "$MANIFEST"
            )

            echo "Contenu filtré pour Sonar :"
            find "$SONAR_ROOT" -type f || echo "Aucun fichier analysable."
          displayName: 'Construire le scope Sonar à partir du package.xml'

        # Préparation SonarCloud
        - task: SonarCloudPrepare@3
          displayName: 'Prepare SonarCloud analysis (UAT)'
          env:
            SONAR_TOKEN: $(SONAR_TOKEN)
          inputs:
            SonarCloud: 'SF-SonarCloud'          # Nom du service connection SonarCloud
            organization: 'sonarcloudtools'      # Ton organization SonarCloud
            scannerMode: 'cli'
            configMode: 'manual'
            cliProjectKey: 'DBS.SalesForce'
            cliProjectName: 'DBS.SalesForce'
            sonarToken: '$(SONAR_TOKEN)'
            # On pointe sur le répertoire filtré (même structure que force-app)
            cliSources: 'sonar-scope/force-app/main/default'
            extraProperties: |
              sonar.sourceEncoding=UTF-8
              # Contexte PR (si Build.Reason == PullRequest, ces variables seront renseignées)
              sonar.pullrequest.key=$(System.PullRequest.PullRequestId)
              sonar.pullrequest.branch=$(System.PullRequest.SourceBranch)
              sonar.pullrequest.base=$(System.PullRequest.TargetBranch)

        # Lancer l'analyse Sonar
        - task: SonarCloudAnalyze@3
          displayName: 'Run SonarCloud analysis (UAT)'
          env:
            SONAR_TOKEN: $(SONAR_TOKEN)
          inputs:
            jdkversion: 'JAVA_HOME_21_X64'

    # ---------------------------------------
    # Job 1 : Deploy_UAT (inchangé)
    # ---------------------------------------
    - deployment: Deploy_UAT
      displayName: 'Deploy to Salesforce UAT'
      environment: 'UAT Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (UAT)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyUat
                inputs:
                  secureFile: 'SF_UAT_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (UAT)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID)" \
                    --jwt-key-file "$(sfdxJwtKeyUat.secureFilePath)" \
                    --username "$(SFDX_USERNAME)" \
                    --instance-url "$SF_ORG_INSTANCE_URL" \
                    --alias uat
                  set -x

                  sf org display --target-org uat
                displayName: 'Authenticate Salesforce (JWT UAT)'
                env:
                  SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
                  SFDX_USERNAME: $(SFDX_USERNAME)
                  SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

              # 5) Conversion vers MDAPI
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) DEBUG : package.xml
              - script: |
                  set -euo pipefail
                  source use_dir.env
                  MANIFEST_PATH="manifest/package.xml"

                  echo "=== RÉSUMÉ PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('• ',normalize-space(./*[local-name()='name']),' (',count(./*[local-name()='members']),')')" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun type trouvé"

                  echo ""
                  echo "=== DÉTAILS PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('# ',normalize-space(./*[local-name()='name']))" -n \
                    -m "./*[local-name()='members']" \
                    -v "concat('  - ',normalize-space(.))" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun membre trouvé"
                displayName: 'DEBUG: Liste du package.xml'

              # 7) Déploiement UAT
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  sf deploy metadata \
                    --metadata-dir "$USE_DIR" \
                    ${USE_MANIFEST} \
                    --target-org uat \
                    --test-level NoTestRun \
                    --wait 120 \
                    --json > deploy.json 2> deploy.err || SF_EXIT=$?

                  jq . deploy.json || cat deploy.json
                  cat deploy.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Deploy to UAT (NoTestRun)'

              # 8) Publish minimal logs
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy.json deploy.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-uat'
                  publishLocation: 'Container'

# ===========================================
# Stage 2 : PROD - Validation (Dry Run only)
# Triggers: push/PR to 'main' or 'release'
# ===========================================
- stage: PROD_Validate
  displayName: 'PROD Validation (Dry Run)'
  dependsOn: []
  condition: |
    or(
      or(
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq(variables['Build.SourceBranch'], 'refs/heads/release')
      ),
      or(
        eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/main'),
        eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/release')
      )
    )
  jobs:
    # ---------------------------------------
    # Job 0 : Analyse Sonar sur le scope package.xml
    # (s'exécute dès que le stage PROD_Validate s'exécute : push ou PR vers main/release)
    # ---------------------------------------
    - job: Sonar_Analysis_PROD
      displayName: 'SonarCloud analysis (scope = package.xml)'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self
          fetchDepth: 0

        - script: |
            set -euo pipefail
            sudo apt-get update -y
            sudo apt-get install -y xmlstarlet
          displayName: 'Install xmlstarlet'

        - script: |
            set -euo pipefail
            set -x

            MANIFEST="manifest/package.xml"
            SONAR_ROOT="sonar-scope"

            [[ -f "$MANIFEST" ]] || { echo "ERREUR: $MANIFEST introuvable"; exit 21; }

            rm -rf "$SONAR_ROOT"
            mkdir -p "$SONAR_ROOT"

            while IFS=';' read -r TYPE MEMBER; do
              case "$TYPE" in
                ApexClass)
                  SRC="force-app/main/default/classes/${MEMBER}.cls"
                  ;;
                ApexTrigger)
                  SRC="force-app/main/default/triggers/${MEMBER}.trigger"
                  ;;
                *)
                  SRC=""
                  ;;
              esac

              if [[ -n "$SRC" && -e "$SRC" ]]; then
                DEST="$SONAR_ROOT/$SRC"
                mkdir -p "$(dirname "$DEST")"
                cp -R "$SRC" "$DEST"
              else
                echo "INFO: Pas de fichier source pour $TYPE / $MEMBER (ignoré)."
              fi
            done < <(
              xmlstarlet sel -t \
                -m "//*[local-name()='types']" \
                -v "concat(normalize-space(./*[local-name()='name']),';',./*[local-name()='members'])" -n \
                "$MANIFEST"
            )

            echo "Contenu filtré pour Sonar :"
            find "$SONAR_ROOT" -type f || echo "Aucun fichier analysable."
          displayName: 'Construire le scope Sonar à partir du package.xml'

        - task: SonarCloudPrepare@3
          displayName: 'Prepare SonarCloud analysis (PROD)'
          env:
            SONAR_TOKEN: $(SONAR_TOKEN)
          inputs:
            SonarCloud: 'SF-SonarCloud'
            organization: 'sonarcloudtools'
            scannerMode: 'cli'
            configMode: 'manual'
            cliProjectKey: 'DBS.SalesForce'
            cliProjectName: 'DBS.SalesForce'
            sonarToken: '$(SONAR_TOKEN)'
            cliSources: 'sonar-scope/force-app/main/default'
            extraProperties: |
              sonar.sourceEncoding=UTF-8
              sonar.pullrequest.key=$(System.PullRequest.PullRequestId)
              sonar.pullrequest.branch=$(System.PullRequest.SourceBranch)
              sonar.pullrequest.base=$(System.PullRequest.TargetBranch)

        - task: SonarCloudAnalyze@3
          displayName: 'Run SonarCloud analysis (PROD)'
          env:
            SONAR_TOKEN: $(SONAR_TOKEN)
          inputs:
            jdkversion: 'JAVA_HOME_21_X64'

    # ---------------------------------------
    # Job 1 : Validation PROD (dry run)
    # ---------------------------------------
    - deployment: Validate_PROD_DryRun
      displayName: 'Validate on Salesforce PROD (checkonly)'
      environment: 'PROD Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (PROD)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyProd
                inputs:
                  secureFile: 'SF_PRD_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (PROD)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID_PRD:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID_PRD manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME_PRD:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME_PRD manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL_PRD:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL_PRD manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID_PRD)" \
                    --jwt-key-file "$(sfdxJwtKeyProd.secureFilePath)" \
                    --username "$(SFDX_USERNAME_PRD)" \
                    --instance-url "$SF_ORG_INSTANCE_URL_PRD" \
                    --alias prod
                  set -x

                  sf org display --target-org prod
                displayName: 'Authenticate Salesforce (JWT PROD)'
                env:
                  SFDX_CLIENT_ID_PRD: $(SFDX_CLIENT_ID_PRD)
                  SFDX_USERNAME_PRD: $(SFDX_USERNAME_PRD)
                  SF_ORG_INSTANCE_URL_PRD: $(SF_ORG_INSTANCE_URL_PRD)

              # 5) Conversion vers MDAPI (réutilise la même logique)
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) DEBUG : package.xml
              - script: |
                  set -euo pipefail
                  source use_dir.env
                  MANIFEST_PATH="manifest/package.xml"

                  echo "=== RÉSUMÉ PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('• ',normalize-space(./*[local-name()='name']),' (',count(./*[local-name()='members']),')')" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun type trouvé"

                  echo ""
                  echo "=== DÉTAILS PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('# ',normalize-space(./*[local-name()='name']))" -n \
                    -m "./*[local-name()='members']" \
                    -v "concat('  - ',normalize-space(.))" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun membre trouvé"
                displayName: 'DEBUG: Liste du package.xml'

              # 7) Validation PROD (dry run)
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  # TEST_LEVEL_PROD = RunLocalTests ou RunAllTestsInOrg
                  sf project deploy start \
                    --metadata-dir "$USE_DIR" \
                    ${USE_MANIFEST} \
                    --target-org prod \
                    --test-level "$(TEST_LEVEL_PROD)" \
                    --dry-run \
                    --wait 180 \
                    --json > deploy_prod_validate.json 2> deploy_prod_validate.err || SF_EXIT=$?

                  jq . deploy_prod_validate.json || cat deploy_prod_validate.json
                  cat deploy_prod_validate.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy_prod_validate.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Validate on PROD (checkonly)'

              # 8) Publish minimal logs
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy_prod_validate.json deploy_prod_validate.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs (PROD)'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs (PROD)'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-prod-validate'
                  publishLocation: 'Container'

# ===========================================
# Stage 3 : UAT Nightly Validation (Scheduled, tests executed)
# ===========================================
- stage: UAT_Validate_Nightly
  displayName: 'UAT Nightly Validation (Run Tests)'
  dependsOn: []
  condition: |
    and(
      eq(variables['Build.Reason'], 'Schedule'),
      eq(variables['Build.SourceBranch'], 'refs/heads/uat')
    )
  variables:
    TEST_LEVEL_UAT_NIGHTLY: 'RunAllTestsInOrg'  # or 'RunLocalTests' if preferred
  jobs:
    # Pas de Sonar ici pour l'instant (tu m’avais parlé surtout des 3 branches pour le scope déployé).
    # Si tu veux aussi Sonar sur le nightly, on pourra rajouter un job Sonar_Analysis_UAT_Nightly
    # identique à Sonar_Analysis_UAT, sans les propriétés PR si tu préfères.

    - deployment: Validate_UAT_DryRun
      displayName: 'Validate on Salesforce UAT (no deploy, run tests)'
      environment: 'UAT Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (UAT)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyUatNightly
                inputs:
                  secureFile: 'SF_UAT_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (UAT)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID)" \
                    --jwt-key-file "$(sfdxJwtKeyUatNightly.secureFilePath)" \
                    --username "$(SFDX_USERNAME)" \
                    --instance-url "$SF_ORG_INSTANCE_URL" \
                    --alias uat
                  set -x

                  sf org display --target-org uat
                displayName: 'Authenticate Salesforce (JWT UAT)'
                env:
                  SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
                  SFDX_USERNAME: $(SFDX_USERNAME)
                  SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

              # 5) Convert to MDAPI (same logic as your other stages)
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) UAT validation (no deploy) WITH tests
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  # Official validation path in the new CLI:
                  sf project deploy validate \
                    ${USE_MANIFEST} \
                    --metadata-dir "$USE_DIR" \
                    --target-org uat \
                    --test-level "$(TEST_LEVEL_UAT_NIGHTLY)" \
                    --wait 180 \
                    --json > deploy_uat_nightly_validate.json 2> deploy_uat_nightly_validate.err || SF_EXIT=$?

                  jq . deploy_uat_nightly_validate.json || cat deploy_uat_nightly_validate.json
                  cat deploy_uat_nightly_validate.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy_uat_nightly_validate.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Validate on UAT (tests executed)'

              # 7) Artifacts
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy_uat_nightly_validate.json deploy_uat_nightly_validate.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs (UAT nightly)'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs (UAT nightly)'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-uat-nightly'
                  publishLocation: 'Container'
