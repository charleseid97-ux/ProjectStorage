# -------------------------------------------------------------------
# Salesforce CI/CD
# 1) SonarCloud (scoped to manifest/package.xml) runs on every commit / PR (any branch)
# 2) Deployment stages run only on routed branches (uat / release / main)
# 3) Hard gate: if New Code has >= 1 BLOCKER or CRITICAL issue -> pipeline fails (red X) and no deployment
#
# Branch routing (deploy):
#  - uat      => Deploy_UAT
#  - release  => Validate_PROD_DryRun
#  - main     => Validate_PROD_DryRun
# -------------------------------------------------------------------

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Ajuste le niveau de tests pour la validation PROD
  TEST_LEVEL_PROD: 'RunLocalTests' # ou 'RunAllTestsInOrg'

  # -----------------
  # SonarCloud
  # -----------------
  workingDirectory: '$(Build.SourcesDirectory)'
  SONAR_ORG: 'sonarcloudtools'
  SONAR_PROJECT_KEY: 'DBS.SalesForce'
  SONAR_PROJECT_NAME: 'DBS.SalesForce'

  # Salesforce paths (Sonar inclusions via package.xml)
  MANIFEST_PATH: 'manifest/package.xml'
  SFDX_ROOT: 'force-app/main/default'

stages:

# =========================
# Stage 0 : SONAR (Always)
# - Build sonar.inclusions from package.xml
# - Run SonarCloud analysis
# - Gate: fail pipeline if BLOCKER/CRITICAL found on New Code
# =========================
- stage: SONAR
  displayName: 'SonarCloud + Gate (BLOCKER/CRITICAL)'
  jobs:
  - job: Sonar
    displayName: 'Sonar analysis + blocking gate'
    steps:
    - checkout: self
      fetchDepth: 0

    # Tools used by scripts
    - script: |
        set -euo pipefail
        sudo apt-get update -y
        sudo apt-get install -y jq xmlstarlet curl
      displayName: 'Install jq + xmlstarlet + curl'

    # 1) Build sonar.inclusions from manifest/package.xml (Apex, Triggers, VF, Aura, LWC)
    - bash: |
        set -euo pipefail
        set -x

        MANIFEST="$(MANIFEST_PATH)"
        ROOT="$(SFDX_ROOT)"

        [[ -f "$MANIFEST" ]] || { echo "ERREUR: $MANIFEST introuvable"; exit 21; }

        # helper: get members for a given metadata type
        members_of () {
          local t="$1"
          xmlstarlet sel -t \
            -m "//*[local-name()='types'][./*[local-name()='name']='$t']/*[local-name()='members']" \
            -v "normalize-space(.)" -n "$MANIFEST" 2>/dev/null | sed '/^$/d' || true
        }

        rm -f sonar-inclusions.txt
        touch sonar-inclusions.txt

        add_incl () { echo "$1" >> sonar-inclusions.txt; }

        add_folder_or_specific () {
          # $1 = members list, $2 = folder, $3 = suffix pattern (optional)
          local members="$1"
          local folder="$2"
          local suffix="${3:-}"
          local has_all=0

          while IFS= read -r m; do
            [[ -z "$m" ]] && continue
            if [[ "$m" == "*" ]]; then
              has_all=1
            else
              if [[ -n "$suffix" ]]; then
                add_incl "$folder/$m$suffix"
              else
                add_incl "$folder/$m/**"
              fi
            fi
          done <<< "$members"

          if [[ $has_all -eq 1 ]]; then
            if [[ -n "$suffix" ]]; then
              add_incl "$folder/**$suffix"
            else
              add_incl "$folder/**"
            fi
          fi
        }

        # Apex Classes
        APEX_CLASSES="$(members_of ApexClass)"
        if [[ -n "$APEX_CLASSES" ]]; then
          add_folder_or_specific "$APEX_CLASSES" "$ROOT/classes" ".cls"
          add_folder_or_specific "$APEX_CLASSES" "$ROOT/classes" ".cls-meta.xml"
        fi

        # Apex Triggers
        APEX_TRIGGERS="$(members_of ApexTrigger)"
        if [[ -n "$APEX_TRIGGERS" ]]; then
          add_folder_or_specific "$APEX_TRIGGERS" "$ROOT/triggers" ".trigger"
          add_folder_or_specific "$APEX_TRIGGERS" "$ROOT/triggers" ".trigger-meta.xml"
        fi

        # Visualforce Pages
        VF_PAGES="$(members_of ApexPage)"
        if [[ -n "$VF_PAGES" ]]; then
          add_folder_or_specific "$VF_PAGES" "$ROOT/pages" ".page"
          add_folder_or_specific "$VF_PAGES" "$ROOT/pages" ".page-meta.xml"
        fi

        # Visualforce Components
        VF_CMPS="$(members_of ApexComponent)"
        if [[ -n "$VF_CMPS" ]]; then
          add_folder_or_specific "$VF_CMPS" "$ROOT/components" ".component"
          add_folder_or_specific "$VF_CMPS" "$ROOT/components" ".component-meta.xml"
        fi

        # LWC Bundles
        LWC_BUNDLES="$(members_of LightningComponentBundle)"
        if [[ -n "$LWC_BUNDLES" ]]; then
          add_folder_or_specific "$LWC_BUNDLES" "$ROOT/lwc"
        fi

        # Aura Bundles
        AURA_BUNDLES="$(members_of AuraDefinitionBundle)"
        if [[ -n "$AURA_BUNDLES" ]]; then
          add_folder_or_specific "$AURA_BUNDLES" "$ROOT/aura"
        fi

        # Cleanup + unique
        sort -u sonar-inclusions.txt -o sonar-inclusions.txt
        [[ -s sonar-inclusions.txt ]] || { echo "ERREUR: aucune inclusion Sonar générée depuis package.xml."; exit 22; }

        # Convert to CSV for sonar.inclusions
        SONAR_INCLUSIONS="$(paste -sd, sonar-inclusions.txt)"
        echo "##vso[task.setvariable variable=SONAR_INCLUSIONS]$SONAR_INCLUSIONS"
      displayName: 'Build Sonar inclusions from package.xml'
      workingDirectory: $(workingDirectory)

    # 2) SonarCloud Prepare (CLI mode) with dynamic sonar.inclusions
    - task: SonarCloudPrepare@3
      displayName: 'Prepare SonarCloud analysis (package.xml-only)'
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)
      inputs:
        SonarCloud: 'SF-SonarCloud'
        organization: '$(SONAR_ORG)'
        scannerMode: 'cli'
        configMode: 'manual'
        cliProjectKey: '$(SONAR_PROJECT_KEY)'
        cliProjectName: '$(SONAR_PROJECT_NAME)'
        sonarToken: '$(SONAR_TOKEN)'
        cliSources: '.'
        extraProperties: |
          sonar.inclusions=$(SONAR_INCLUSIONS)
          sonar.scanner.skipJreProvisioning=true
          sonar.sourceEncoding=UTF-8
          sonar.exclusions=**/.git/**,**/node_modules/**,**/bin/**,**/obj/**

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud analysis'
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)
      inputs:
        jdkversion: 'JAVA_HOME_21_X64'

    # 3) Gate: fail pipeline if New Code has any BLOCKER or CRITICAL issue
    - bash: |
        set -euo pipefail

        ORG="$(SONAR_ORG)"
        PROJECT="$(SONAR_PROJECT_KEY)"
        TOKEN="$(SONAR_TOKEN)"

        [[ -n "${TOKEN:-}" ]] || { echo "ERREUR: SONAR_TOKEN vide"; exit 31; }

        # Branch detection:
        # - PR build: use target branch
        # - Branch build: use current branch name
        if [[ -n "${SYSTEM_PULLREQUEST_TARGETBRANCH:-}" ]]; then
          BRANCH="${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
          CONTEXT="PR target branch"
        else
          BRANCH="${BUILD_SOURCEBRANCHNAME}"
          CONTEXT="branch build"
        fi

        echo "Sonar context: $CONTEXT"
        echo "Sonar branch : $BRANCH"

        API="https://sonarcloud.io/api/issues/search"
        RESP=$(curl -sS -u "${TOKEN}:" \
          --get "$API" \
          --data-urlencode "organization=$ORG" \
          --data-urlencode "projects=$PROJECT" \
          --data-urlencode "branch=$BRANCH" \
          --data-urlencode "inNewCodePeriod=true" \
          --data-urlencode "resolved=false" \
          --data-urlencode "facets=types,severities" \
          --data-urlencode "ps=1")

        echo ""
        echo "=== NEW CODE - ALERTS PAR TYPE ==="
        echo "$RESP" | jq -r '(.facets[] | select(.property=="types") | .values[] | "\(.val): \(.count)")' || true

        echo ""
        echo "=== NEW CODE - ALERTS PAR SEVERITE ==="
        echo "$RESP" | jq -r '(.facets[] | select(.property=="severities") | .values[] | "\(.val): \(.count)")' || true

        BLOCKING=$(echo "$RESP" | jq '
          (.facets[] | select(.property=="severities") | .values
            | map(select(.val=="BLOCKER" or .val=="CRITICAL") | .count)
            | add) // 0')

        echo ""
        echo "Blocking (BLOCKER+CRITICAL) on New Code: $BLOCKING"

        if [[ "$BLOCKING" -gt 0 ]]; then
          echo "##vso[task.logissue type=error]Sonar Gate failed: $BLOCKING blocking issue(s) found (BLOCKER/CRITICAL). Deployment stopped."
          exit 42
        fi

        echo "Sonar Gate OK: no BLOCKER/CRITICAL on New Code."
      displayName: 'Gate: stop deploy if BLOCKER/CRITICAL > 0'
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)

# =========================
# Stage 1 : UAT
# - Triggers: push/PR to 'uat'
# - Runs only if SONAR stage succeeded
# =========================
- stage: UAT
  displayName: 'UAT Stage'
  dependsOn: SONAR
  condition: |
    and(
      succeeded('SONAR'),
      or(
        eq(variables['Build.SourceBranch'], 'refs/heads/uat'),
        eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/uat')
      )
    )
  jobs:
    - deployment: Deploy_UAT
      displayName: 'Deploy to Salesforce UAT'
      environment: 'UAT Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (UAT)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyUat
                inputs:
                  secureFile: 'SF_UAT_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (UAT)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID)" \
                    --jwt-key-file "$(sfdxJwtKeyUat.secureFilePath)" \
                    --username "$(SFDX_USERNAME)" \
                    --instance-url "$SF_ORG_INSTANCE_URL" \
                    --alias uat
                  set -x

                  sf org display --target-org uat
                displayName: 'Authenticate Salesforce (JWT UAT)'
                env:
                  SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
                  SFDX_USERNAME: $(SFDX_USERNAME)
                  SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

              # 5) Conversion vers MDAPI
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) DEBUG : package.xml
              - script: |
                  set -euo pipefail
                  source use_dir.env
                  MANIFEST_PATH="manifest/package.xml"

                  echo "=== RÉSUMÉ PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('• ',normalize-space(./*[local-name()='name']),' (',count(./*[local-name()='members']),')')" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun type trouvé"

                  echo ""
                  echo "=== DÉTAILS PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('# ',normalize-space(./*[local-name()='name']))" -n \
                    -m "./*[local-name()='members']" \
                    -v "concat('  - ',normalize-space(.))" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun membre trouvé"
                displayName: 'DEBUG: Liste du package.xml'

              # 7) Déploiement UAT
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  sf deploy metadata \
                    --metadata-dir "$USE_DIR" \
                    ${USE_MANIFEST} \
                    --target-org uat \
                    --test-level NoTestRun \
                    --wait 120 \
                    --json > deploy.json 2> deploy.err || SF_EXIT=$?

                  jq . deploy.json || cat deploy.json
                  cat deploy.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Deploy to UAT (NoTestRun)'

              # 8) Publish minimal logs
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy.json deploy.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-uat'
                  publishLocation: 'Container'

# ===========================================
# Stage 2 : PROD - Validation (Dry Run only)
# - Triggers: push/PR to 'main' or 'release'
# - Runs only if SONAR stage succeeded
# ===========================================
- stage: PROD_Validate
  displayName: 'PROD Validation (Dry Run)'
  dependsOn: SONAR
  condition: |
    and(
      succeeded('SONAR'),
      or(
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/release')
        ),
        or(
          eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/main'),
          eq(variables['System.PullRequest.TargetBranch'], 'refs/heads/release')
        )
      )
    )
  jobs:
    - deployment: Validate_PROD_DryRun
      displayName: 'Validate on Salesforce PROD (checkonly)'
      environment: 'PROD Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (PROD)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyProd
                inputs:
                  secureFile: 'SF_PRD_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (PROD)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID_PRD:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID_PRD manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME_PRD:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME_PRD manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL_PRD:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL_PRD manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID_PRD)" \
                    --jwt-key-file "$(sfdxJwtKeyProd.secureFilePath)" \
                    --username "$(SFDX_USERNAME_PRD)" \
                    --instance-url "$SF_ORG_INSTANCE_URL_PRD" \
                    --alias prod
                  set -x

                  sf org display --target-org prod
                displayName: 'Authenticate Salesforce (JWT PROD)'
                env:
                  SFDX_CLIENT_ID_PRD: $(SFDX_CLIENT_ID_PRD)
                  SFDX_USERNAME_PRD: $(SFDX_USERNAME_PRD)
                  SF_ORG_INSTANCE_URL_PRD: $(SF_ORG_INSTANCE_URL_PRD)

              # 5) Conversion vers MDAPI
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) DEBUG : package.xml
              - script: |
                  set -euo pipefail
                  source use_dir.env
                  MANIFEST_PATH="manifest/package.xml"

                  echo "=== RÉSUMÉ PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('• ',normalize-space(./*[local-name()='name']),' (',count(./*[local-name()='members']),')')" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun type trouvé"

                  echo ""
                  echo "=== DÉTAILS PAR TYPE ==="
                  xmlstarlet sel -t \
                    -m "//*[local-name()='types']" \
                    -v "concat('# ',normalize-space(./*[local-name()='name']))" -n \
                    -m "./*[local-name()='members']" \
                    -v "concat('  - ',normalize-space(.))" -n \
                    "$MANIFEST_PATH" || echo "(info) Aucun membre trouvé"
                displayName: 'DEBUG: Liste du package.xml'

              # 7) Validation PROD (dry run)
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  sf project deploy start \
                    --metadata-dir "$USE_DIR" \
                    ${USE_MANIFEST} \
                    --target-org prod \
                    --test-level "$(TEST_LEVEL_PROD)" \
                    --dry-run \
                    --wait 180 \
                    --json > deploy_prod_validate.json 2> deploy_prod_validate.err || SF_EXIT=$?

                  jq . deploy_prod_validate.json || cat deploy_prod_validate.json
                  cat deploy_prod_validate.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy_prod_validate.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Validate on PROD (checkonly)'

              # 8) Publish minimal logs
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy_prod_validate.json deploy_prod_validate.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs (PROD)'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs (PROD)'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-prod-validate'
                  publishLocation: 'Container'

# ===========================================
# Stage 3 : UAT Nightly Validation (Scheduled, tests executed)
# ===========================================
- stage: UAT_Validate_Nightly
  displayName: 'UAT Nightly Validation (Run Tests)'
  dependsOn: SONAR
  condition: |
    and(
      succeeded('SONAR'),
      eq(variables['Build.Reason'], 'Schedule'),
      eq(variables['Build.SourceBranch'], 'refs/heads/uat')
    )
  variables:
    TEST_LEVEL_UAT_NIGHTLY: 'RunAllTestsInOrg'
  jobs:
    - deployment: Validate_UAT_DryRun
      displayName: 'Validate on Salesforce UAT (no deploy, run tests)'
      environment: 'UAT Salesforce'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              # 1) Secure file: JWT key (UAT)
              - task: DownloadSecureFile@1
                name: sfdxJwtKeyUatNightly
                inputs:
                  secureFile: 'SF_UAT_key.pem'

              # 2) Node + Salesforce CLI
              - task: NodeTool@0
                displayName: 'Install Node.js'
                inputs:
                  versionSpec: '18.x'

              - script: |
                  npm i -g @salesforce/cli
                  sf --version
                  sf plugins --core
                displayName: 'Install Salesforce CLI'

              # 3) jq + xmlstarlet
              - script: |
                  sudo apt-get update -y
                  sudo apt-get install -y jq xmlstarlet
                displayName: 'Install jq + xmlstarlet'

              # 4) Auth Salesforce (UAT)
              - script: |
                  set -euo pipefail
                  set -x

                  if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
                  if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
                  if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

                  set +x
                  sf org login jwt \
                    --client-id "$(SFDX_CLIENT_ID)" \
                    --jwt-key-file "$(sfdxJwtKeyUatNightly.secureFilePath)" \
                    --username "$(SFDX_USERNAME)" \
                    --instance-url "$SF_ORG_INSTANCE_URL" \
                    --alias uat
                  set -x

                  sf org display --target-org uat
                displayName: 'Authenticate Salesforce (JWT UAT)'
                env:
                  SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
                  SFDX_USERNAME: $(SFDX_USERNAME)
                  SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

              # 5) Conversion vers MDAPI
              - script: |
                  set -euo pipefail
                  set -x

                  MANIFEST_PATH="manifest/package.xml"
                  MDAPI_DIR="mdapi_pkg"
                  MDAPI_FALLBACK_DIR="mdapi_out"

                  [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

                  rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

                  set +e
                  sf project convert source \
                    --manifest "$MANIFEST_PATH" \
                    --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
                  CONVERT1_EXIT=$?
                  set -e

                  if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
                    echo "Conversion filtrée indisponible → fallback complet"
                    sf project convert source \
                      --root-dir force-app \
                      --output-dir "$MDAPI_FALLBACK_DIR"
                    echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
                    echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
                  else
                    echo "USE_DIR=$MDAPI_DIR" > use_dir.env
                    echo "USE_MANIFEST=" >> use_dir.env
                  fi
                displayName: 'Convert to MDAPI (manifest-first with fallback)'

              # 6) UAT validation (no deploy) WITH tests
              - script: |
                  set -euo pipefail
                  set -x
                  source use_dir.env

                  sf project deploy validate \
                    ${USE_MANIFEST} \
                    --metadata-dir "$USE_DIR" \
                    --target-org uat \
                    --test-level "$(TEST_LEVEL_UAT_NIGHTLY)" \
                    --wait 180 \
                    --json > deploy_uat_nightly_validate.json 2> deploy_uat_nightly_validate.err || SF_EXIT=$?

                  jq . deploy_uat_nightly_validate.json || cat deploy_uat_nightly_validate.json
                  cat deploy_uat_nightly_validate.err || true

                  JOB_ID=$(jq -r '.result.id // empty' deploy_uat_nightly_validate.json || true)
                  if [[ -n "$JOB_ID" ]]; then
                    sf project deploy report --job-id "$JOB_ID" || true
                  fi

                  exit ${SF_EXIT:-0}
                displayName: 'Validate on UAT (tests executed)'

              # 7) Artifacts
              - script: |
                  set -euo pipefail
                  mkdir -p run-logs
                  for f in deploy_uat_nightly_validate.json deploy_uat_nightly_validate.err manifest.summary.txt manifest.members.txt; do
                    if [ -f "$f" ]; then cp -f "$f" run-logs/; fi
                  done
                  if [ -z "$(ls -A run-logs)" ]; then echo "No logs produced." > run-logs/README.txt; fi
                displayName: 'Collect minimal logs (UAT nightly)'
                condition: always()

              - task: PublishBuildArtifacts@1
                displayName: 'Publish minimal logs (UAT nightly)'
                condition: always()
                inputs:
                  PathtoPublish: 'run-logs'
                  ArtifactName: 'sf-logs-uat-nightly'
                  publishLocation: 'Container'
