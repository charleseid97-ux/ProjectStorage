# -------------------------------------------------------------------
# Salesforce CI/CD - UAT (partcopy) via Azure Pipelines
# - Auth JWT avec Connected App
# - Convert Source -> MDAPI
# - Déploiement + tests Apex (JUnit export)
# -------------------------------------------------------------------

trigger:
  - main   # (ou désactive si tu veux run manuellement)

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  # 1) Clé privée stockée en Secure Files (Library)
  - task: DownloadSecureFile@1
    name: sfdxJwtKey
    inputs:
      secureFile: 'SF_UAT_key.pem'   # <--- nom exact en Secure Files

  # 2) Node + Salesforce CLI
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '18.x'

  - script: |
      npm i -g @salesforce/cli sfdx-cli
      sf --version && sfdx --version
    displayName: 'Install Salesforce CLI'

  # 3) Outil jq (pour parser build.json)
  - script: |
      sudo apt-get update -y
      sudo apt-get install -y jq
    displayName: 'Install jq'

  # 4) Authentification JWT sur la sandbox partcopy
  - script: |
      sfdx force:auth:jwt:grant \
        --clientid "$(SFDX_CLIENT_ID)" \
        --jwtkeyfile "$(sfdxJwtKey.secureFilePath)" \
        --username "$(SFDX_USERNAME)" \
        --instance-url "$SF_ORG_INSTANCE_URL" \
        --setalias uat
      sf org display --target-org uat
    displayName: 'Authenticate Salesforce (JWT UAT)'

  # 5) Conversion Source -> MDAPI (adapter -r si ton code n'est pas sous force-app)
  - script: |
      rm -rf mdapi_out
      sfdx force:source:convert -r force-app -d mdapi_out
    displayName: 'Convert source to MDAPI'

  # 6) Déploiement MDAPI + tests locaux + sortie JSON/JUnit
  - script: |
      sfdx force:mdapi:deploy \
        -d mdapi_out \
        -u uat \
        -l RunLocalTests \
         --check-only \
        -w 60 \
        --json \
        --junit > build.json
    displayName: 'Deploy to UAT (MDAPI + RunLocalTests)'

  # 7) Report + trace
  - script: |
      DEPLOY_ID=$(jq -r '.result.id // empty' build.json)
      if [ -n "$DEPLOY_ID" ]; then
        sfdx force:mdapi:deploy:report -i "$DEPLOY_ID" -u uat -w 1
      else
        echo "No deploy id found in build.json"; cat build.json; exit 1
      fi
      echo
      cat build.json
    condition: always()
    timeoutInMinutes: 5
    displayName: 'Print Deploy Report'

  # 8) Localiser le fichier JUnit (ou fallback si absent)
  - script: |
      JUNIT_PATH=$(jq -r '.result.junit // empty' build.json)
      if [ -z "$JUNIT_PATH" ]; then
        JUNIT_PATH="**/test-result-*.xml"  # fallback
      fi
      echo "##vso[task.setvariable variable=SFDX_TEST_OUTPUT_PATH]$JUNIT_PATH"
    condition: always()
    timeoutInMinutes: 5
    displayName: 'Locate Test Report'

  # 9) Publication des résultats de tests
  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testRunner: JUnit
      testResultsFiles: '$(SFDX_TEST_OUTPUT_PATH)'
      testRunTitle: '[UAT] Salesforce Deployment'
      failTaskOnFailedTests: true
      platform: 'UAT'
