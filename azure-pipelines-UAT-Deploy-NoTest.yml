# -------------------------------------------------------------------
# Salesforce CI/CD - UAT (manifest/package.xml via MDAPI) – Azure Pipelines
# Déploiement direct (NoTestRun) + Debug du package.xml avant déploiement
# Déclenchement: à chaque commit fusionné dans la branche UAT
# -------------------------------------------------------------------

trigger:
  branches:
    include:
      - UAT       # ⚠️ respecte exactement le nom de ta branche

pr: none          # optionnel: n'exécute pas le pipeline sur les PR ouvertes

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  # 1) Secure file: JWT key
  - task: DownloadSecureFile@1
    name: sfdxJwtKey
    inputs:
      secureFile: 'SF_UAT_key.pem'

  # 2) Node + Salesforce CLI (unified 'sf')
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '18.x'

  - script: |
      npm i -g @salesforce/cli
      sf --version
      sf plugins --core
    displayName: 'Install Salesforce CLI'

  # 3) jq + xmlstarlet (pour parser le package.xml)
  - script: |
      set -euo pipefail
      sudo apt-get update -y
      sudo apt-get install -y jq xmlstarlet
    displayName: 'Install jq + xmlstarlet'

  # 4) Auth + sanity checks
  - script: |
      set -euo pipefail
      set -x

      if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
      if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
      if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

      set +x
      sf org login jwt \
        --client-id "$(SFDX_CLIENT_ID)" \
        --jwt-key-file "$(sfdxJwtKey.secureFilePath)" \
        --username "$(SFDX_USERNAME)" \
        --instance-url "$SF_ORG_INSTANCE_URL" \
        --alias uat
      set -x

      sf org display --target-org uat
    displayName: 'Authenticate Salesforce (JWT UAT)'
    env:
      SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
      SFDX_USERNAME: $(SFDX_USERNAME)
      SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

  # 5) Conversion vers MDAPI (manifest-first, fallback si besoin)
  - script: |
      set -euo pipefail
      set -x

      MANIFEST_PATH="manifest/package.xml"
      MDAPI_DIR="mdapi_pkg"
      MDAPI_FALLBACK_DIR="mdapi_out"

      [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

      rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

      # Tentative 1 : conversion filtrée par manifeste
      set +e
      sf project convert source \
        --manifest "$MANIFEST_PATH" \
        --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
      CONVERT1_EXIT=$?
      set -e

      echo "=== convert1.out ==="; cat convert1.out || true
      echo "=== convert1.err ==="; cat convert1.err || true

      if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
        echo "Conversion filtrée indisponible ou vide → Fallback conversion complète + filtre au deploy"
        sf project convert source \
          --root-dir force-app \
          --output-dir "$MDAPI_FALLBACK_DIR"
        echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
        echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
      else
        echo "USE_DIR=$MDAPI_DIR" > use_dir.env
        echo "USE_MANIFEST=" >> use_dir.env
      fi
    displayName: 'Convert to MDAPI (manifest-first with fallback)'

  # 6) DEBUG : lister précisément les éléments du package.xml + aperçu fichiers MDAPI
  - script: |
      set -euo pipefail
      set -x

      source use_dir.env
      MANIFEST_PATH="manifest/package.xml"

      echo "=== RÉSUMÉ PAR TYPE (nom + nombre de membres) ==="
      xmlstarlet sel -t \
        -m "/*[local-name()='Package']/*[local-name()='types']" \
        -v "concat('• ', normalize-space(./*[local-name()='name']), ' (', count(./*[local-name()='members']), ')')" -n \
        "$MANIFEST_PATH"

      echo ""
      echo "=== DÉTAIL DES MEMBRES PAR TYPE ==="
      xmlstarlet sel -t \
        -m "/*[local-name()='Package']/*[local-name()='types']" \
        -v "concat('# ', normalize-space(./*[local-name()='name']))" -n \
        -m "./*[local-name()='members']" \
        -v "concat('  - ', normalize-space(.))" -n \
        "$MANIFEST_PATH"

      echo ""
      echo "=== APERÇU DES FICHIERS MDAPI QUI SERONT PRIS EN COMPTE ==="
      find "$USE_DIR" -type f | sed -e 's#^#  - #'

      # Sauvegarde pour artefacts
      {
        echo "Résumé par type:"
        xmlstarlet sel -t \
          -m "/*[local-name()='Package']/*[local-name()='types']" \
          -v "concat('• ', normalize-space(./*[local-name()='name']), ' (', count(./*[local-name()='members']), ')')" -n \
          "$MANIFEST_PATH"
      } > manifest.summary.txt

      {
        echo "Détail membres:"
        xmlstarlet sel -t \
          -m "/*[local-name()='Package']/*[local-name()='types']" \
          -v "concat('# ', normalize-space(./*[local-name()='name']))" -n \
          -m "./*[local-name()='members']" \
          -v "concat('  - ', normalize-space(.))" -n \
          "$MANIFEST_PATH"
      } > manifest.members.txt
    displayName: 'DEBUG: Liste des éléments du package.xml + fichiers MDAPI'

  # 7) Déploiement réel en UAT (SANS TESTS)
  - script: |
      set -euo pipefail
      set -x

      source use_dir.env

      set +e
      sf deploy metadata \
        --metadata-dir "$USE_DIR" \
        ${USE_MANIFEST} \
        --target-org uat \
        --test-level NoTestRun \
        --wait 120 \
        --json > deploy.json 2> deploy.err
      SF_EXIT=$?
      set -e

      echo "=== deploy.json (pretty) ==="
      jq . deploy.json || { echo "deploy.json brut:"; cat deploy.json; }
      echo "=== STDERR (deploy.err) ==="
      cat deploy.err || true

      JOB_ID="$(jq -r '.result.id // empty' deploy.json 2>/dev/null || true)"
      if [[ -n "$JOB_ID" ]]; then
        sf project deploy report --job-id "$JOB_ID" || true
      fi

      if [[ $SF_EXIT -ne 0 ]]; then
        echo "Déploiement en échec (code=$SF_EXIT)."
        exit $SF_EXIT
      fi
    displayName: 'Deploy to UAT (NoTestRun)'

  # 8) Publication des artefacts
  - task: PublishBuildArtifacts@1
    displayName: 'Publish logs + mdapi dirs + manifest debug'
    condition: always()
    inputs:
      PathtoPublish: '.'
      ArtifactName: 'sf-logs'
      publishLocation: 'Container'
