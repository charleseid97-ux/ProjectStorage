# -------------------------------------------------------------------
# Salesforce CI/CD - UAT (manifest/package.xml via MDAPI) – Azure Pipelines
# Déploiement direct (NoTestRun) + DEBUG liste package.xml avant déploiement
# -------------------------------------------------------------------

trigger:
  branches:
    include:
      - UAT

pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  # 1) Secure file: JWT key
  - task: DownloadSecureFile@1
    name: sfdxJwtKey
    inputs:
      secureFile: 'SF_UAT_key.pem'

  # 2) Node + Salesforce CLI
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '18.x'

  - script: |
      npm i -g @salesforce/cli
      sf --version
      sf plugins --core
    displayName: 'Install Salesforce CLI'

  # 3) jq
  - script: |
      sudo apt-get update -y
      sudo apt-get install -y jq
    displayName: 'Install jq'

  # 4) Auth
  - script: |
      set -euo pipefail
      set -x

      if [[ -z "${SFDX_CLIENT_ID:-}" ]]; then set +x; echo "ERREUR: SFDX_CLIENT_ID manquant"; exit 11; fi
      if [[ -z "${SFDX_USERNAME:-}" ]]; then set +x; echo "ERREUR: SFDX_USERNAME manquant"; exit 12; fi
      if [[ -z "${SF_ORG_INSTANCE_URL:-}" ]]; then set +x; echo "ERREUR: SF_ORG_INSTANCE_URL manquant"; exit 13; fi

      set +x
      sf org login jwt \
        --client-id "$(SFDX_CLIENT_ID)" \
        --jwt-key-file "$(sfdxJwtKey.secureFilePath)" \
        --username "$(SFDX_USERNAME)" \
        --instance-url "$SF_ORG_INSTANCE_URL" \
        --alias uat
      set -x

      sf org display --target-org uat
    displayName: 'Authenticate Salesforce (JWT UAT)'
    env:
      SFDX_CLIENT_ID: $(SFDX_CLIENT_ID)
      SFDX_USERNAME: $(SFDX_USERNAME)
      SF_ORG_INSTANCE_URL: $(SF_ORG_INSTANCE_URL)

  # 5) Conversion MDAPI
  - script: |
      set -euo pipefail
      set -x

      MANIFEST_PATH="manifest/package.xml"
      MDAPI_DIR="mdapi_pkg"
      MDAPI_FALLBACK_DIR="mdapi_out"

      [[ -f "$MANIFEST_PATH" ]] || { echo "ERREUR: $MANIFEST_PATH introuvable"; exit 21; }

      rm -rf "$MDAPI_DIR" "$MDAPI_FALLBACK_DIR"

      set +e
      sf project convert source \
        --manifest "$MANIFEST_PATH" \
        --output-dir "$MDAPI_DIR" > convert1.out 2> convert1.err
      CONVERT1_EXIT=$?
      set -e

      if [[ $CONVERT1_EXIT -ne 0 || ! -d "$MDAPI_DIR" || -z "$(ls -A "$MDAPI_DIR" 2>/dev/null || true)" ]]; then
        sf project convert source \
          --root-dir force-app \
          --output-dir "$MDAPI_FALLBACK_DIR"
        echo "USE_DIR=$MDAPI_FALLBACK_DIR" > use_dir.env
        echo "USE_MANIFEST=--manifest $MANIFEST_PATH" >> use_dir.env
      else
        echo "USE_DIR=$MDAPI_DIR" > use_dir.env
        echo "USE_MANIFEST=" >> use_dir.env
      fi
    displayName: 'Convert to MDAPI (manifest-first with fallback)'

  # 6) DEBUG : analyse du package.xml (Python)
  - script: |
      set -euo pipefail
      set -x
      source use_dir.env
      MANIFEST_PATH="manifest/package.xml"

      echo "=== DEBUG package.xml ==="

      cat << 'PY' > manifest_debug.py
import os, sys, xml.etree.ElementTree as ET
MANIFEST_PATH = "manifest/package.xml"
USE_DIR = os.environ.get("USE_DIR", "")
try:
    tree = ET.parse(MANIFEST_PATH)
except Exception as e:
    print(f"ERREUR: parsing {MANIFEST_PATH} : {e}")
    sys.exit(22)
root = tree.getroot()
ns_uri = None
if "}" in root.tag:
    ns_uri = root.tag.split("}")[0].strip("{")
def q(n): return f"{{{ns_uri}}}{n}" if ns_uri else n
types = []
for t in root.findall(q("types")):
    name = (t.findtext(q("name")) or "UNKNOWN").strip()
    members = [ (m.text or "").strip() for m in t.findall(q("members")) if (m.text or "").strip() ]
    types.append((name, members))
print("=== RÉSUMÉ PAR TYPE ===")
for name, members in types:
    print(f"• {name} ({len(members)})")
print("\n=== DÉTAILS ===")
for name, members in types:
    print(f"# {name}")
    for m in members:
        print(f"  - {m}")
with open("manifest.summary.txt","w",encoding="utf-8") as f:
    for n,m in types: f.write(f"• {n} ({len(m)})\n")
with open("manifest.members.txt","w",encoding="utf-8") as f:
    for n,m in types:
        f.write(f"# {n}\n")
        for mm in m: f.write(f"  - {mm}\n")
print("\n=== FICHIERS MDAPI ===")
if USE_DIR and os.path.isdir(USE_DIR):
    count = 0
    for dp,_,files in os.walk(USE_DIR):
        for fn in files:
            print("  - "+os.path.join(dp,fn))
            count+=1
    print(f"Total fichiers: {count}")
else:
    print(f"(Attention) dossier {USE_DIR} introuvable")
PY

      python3 manifest_debug.py
    displayName: 'DEBUG: Liste des éléments du package.xml + fichiers MDAPI'

  # 7) Déploiement
  - script: |
      set -euo pipefail
      set -x
      source use_dir.env
      sf deploy metadata \
        --metadata-dir "$USE_DIR" \
        ${USE_MANIFEST} \
        --target-org uat \
        --test-level NoTestRun \
        --wait 120 \
        --json > deploy.json 2> deploy.err || SF_EXIT=$?
      jq . deploy.json || cat deploy.json
      cat deploy.err || true
      JOB_ID=$(jq -r '.result.id // empty' deploy.json || true)
      if [[ -n "$JOB_ID" ]]; then
        sf project deploy report --job-id "$JOB_ID" || true
      fi
      exit ${SF_EXIT:-0}
    displayName: 'Deploy to UAT (NoTestRun)'

  # 8) Artefacts
  - task: PublishBuildArtifacts@1
    displayName: 'Publish logs + manifest debug'
    condition: always()
    inputs:
      PathtoPublish: '.'
      ArtifactName: 'sf-logs'
      publishLocation: 'Container'
